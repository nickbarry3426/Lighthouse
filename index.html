function noteContextLabel(source) {
  const base = source ? `${source.name} · ${source.kind}` : "Unknown source";
  if (!noteUI.context?.workspace_type) return base;
  const chapter = noteUI.context.chapter_name ? ` · ${noteUI.context.chapter_name}` : "";
  return `${base} · ${noteUI.context.workspace_type}${chapter}`;
}

function startHandwritingNote(sourceId, context = null) {
  state.notes.activeSourceId = sourceId;
  const source = state.notes.sources.find(s => s.id === sourceId);
  noteUI.context = context ? { ...context } : null;
  noteUI.source.textContent = noteContextLabel(source);
  noteUI.el.classList.remove("hidden");
  noteUI.el.setAttribute("aria-hidden", "false");
  noteUI.stack.innerHTML = "";
  noteUI.chunks = [];
  noteUI.strokeDraft = [];
  noteUI.activeStroke = null;
  noteUI.drawing = false;
  noteUI.pointerId = null;
  noteUI.activePen = null;
  noteUI.lastPenAt = 0;
  noteUI.wrap.scrollTop = 0;
  document.documentElement.classList.add("handwriting-mode");
  document.body.classList.add("handwriting-mode");
  ensureNoteChunk(0);
  ensureNoteChunk(1);
  buildInkControls();
  bindNotePointerEvents();
  bindNoteInteractionGuards();
}

function closeHandwritingNote() {
  noteUI.el.classList.add("hidden");
  noteUI.el.setAttribute("aria-hidden", "true");
  noteUI.stack.innerHTML = "";
  noteUI.chunks = [];
  noteUI.strokeDraft = [];
  noteUI.activeStroke = null;
  noteUI.drawing = false;
  noteUI.pointerId = null;
  noteUI.activePen = null;
  noteUI.lastPenAt = 0;
  noteUI.context = null;
  document.documentElement.classList.remove("handwriting-mode");
  document.body.classList.remove("handwriting-mode");
  if (noteUI.autosaveTimer) clearTimeout(noteUI.autosaveTimer);
}

function buildInkControls() {
  noteUI.colorGroup.innerHTML = INK_COLORS.map(c =>
    `<button class="ink-dot ${c.value===noteUI.color?'active':''}" data-ink="${c.value}" title="${c.label}" style="background:${c.value}"></button>`
  ).join("");
  noteUI.thicknessGroup.innerHTML = PEN_SIZES.map(p =>
    `<button class="thickness-btn ${p.px===noteUI.size?'active':''}" data-pen-size="${p.px}">${p.label}</button>`
  ).join("");
  noteUI.colorGroup.querySelectorAll("[data-ink]").forEach(btn => btn.addEventListener("click", () => {
    noteUI.color = btn.dataset.ink;
    buildInkControls();
  }));
  noteUI.thicknessGroup.querySelectorAll("[data-pen-size]").forEach(btn => btn.addEventListener("click", () => {
    noteUI.size = Number(btn.dataset.penSize) || PEN_SIZES[1].px;
    buildInkControls();
  }));
}

function bindNotePointerEvents() {
  if (noteUI.wrap.dataset.bound === "1") return;
  noteUI.wrap.dataset.bound = "1";
  noteUI.wrap.addEventListener("pointerdown", onNotePointerDown, { passive: false });
  noteUI.wrap.addEventListener("pointermove", onNotePointerMove, { passive: false });
  noteUI.wrap.addEventListener("pointerup", onNotePointerUp, { passive: false });
  noteUI.wrap.addEventListener("pointercancel", onNotePointerUp, { passive: false });
  noteUI.wrap.addEventListener("lostpointercapture", onNotePointerUp, { passive: false });
  noteUI.wrap.addEventListener("scroll", () => {
    const count = Math.ceil(noteUI.wrap.scrollHeight / NOTE_CHUNK_HEIGHT);
    if (noteUI.wrap.scrollTop + noteUI.wrap.clientHeight > (count - 1) * NOTE_CHUNK_HEIGHT - 180) {
      ensureNoteChunk(count);
    }
  }, { passive: true });
}

function bindNoteInteractionGuards() {
  if (noteUI.interactionGuardsBound) return;
  noteUI.interactionGuardsBound = true;
  const blockWhenNoteOpen = e => {
    if (noteUI.el.classList.contains("hidden")) return;
    if (e.cancelable) e.preventDefault();
  };
  ["touchstart", "touchmove", "gesturestart", "gesturechange", "gestureend", "selectstart", "dragstart"].forEach(evt => {
    noteUI.wrap.addEventListener(evt, blockWhenNoteOpen, { passive: false });
    noteUI.stack.addEventListener(evt, blockWhenNoteOpen, { passive: false });
  });
  noteUI.el.addEventListener("pointerdown", e => {
    if (noteUI.el.classList.contains("hidden")) return;
    if (e.pointerType === "pen" && !noteUI.wrap.contains(e.target)) {
      if (e.cancelable) e.preventDefault();
      e.stopPropagation();
    }
  }, true);
  noteUI.el.addEventListener("click", e => {
    if (noteUI.el.classList.contains("hidden")) return;
    if (noteUI.drawing && e.target !== noteUI.saveBtn) {
      if (e.cancelable) e.preventDefault();
      e.stopPropagation();
    }
  }, true);
  noteUI.saveBtn.addEventListener("pointerdown", e => {
    if (e.pointerType === "pen" && noteUI.drawing && e.cancelable) e.preventDefault();
  }, { passive: false });
  noteUI.saveBtn.addEventListener("mousedown", e => e.preventDefault());
}

function pointerPoint(e) {
  const clientX = Number.isFinite(e.clientX) ? e.clientX : 0;
  const clientY = Number.isFinite(e.clientY) ? e.clientY : 0;
  const rect = noteUI.stack.getBoundingClientRect();
  const x = clientX - rect.left - NOTE_SIDE_GUTTER;
  const y = clientY - rect.top + noteUI.wrap.scrollTop;
  return {
    x: Math.max(0, Math.min(rect.width - NOTE_SIDE_GUTTER * 2, x)),
    y: Math.max(0, y)
  };
}

function shouldAcceptPointer(e) {
  if (e.pointerType === "pen") {
    noteUI.lastPenAt = performance.now();
    noteUI.activePen = e.pointerId;
    return true;
  }
  if (e.pointerType === "touch") {
    if (noteUI.activePen && performance.now() - noteUI.lastPenAt < 900) return false;
    return false;
  }
  return e.pointerType === "mouse";
}

function onNotePointerDown(e) {
  if (!state.notes.activeSourceId || !shouldAcceptPointer(e)) return;
  if (e.button !== undefined && e.button !== 0) return;
  e.preventDefault();
  e.stopPropagation();
  noteUI.pointerId = e.pointerId;
  noteUI.drawing = true;
  noteUI.activePen = e.pointerId;
  noteUI.lastPenAt = performance.now();
  const p = pointerPoint(e);
  noteUI.activeStroke = {
    id: uid(),
    source_id: state.notes.activeSourceId,
    color: noteUI.color,
    base: noteUI.size,
    started_at: nowISO(),
    points: [{ ...p, t: performance.now(), pressure: e.pressure || 0.5 }]
  };
  drawStrokeDot(noteUI.activeStroke, noteUI.activeStroke.points[0]);
  if (noteUI.wrap.setPointerCapture) noteUI.wrap.setPointerCapture(e.pointerId);
}

function onNotePointerMove(e) {
  if (!noteUI.drawing || e.pointerId !== noteUI.pointerId || !noteUI.activeStroke) return;
  e.preventDefault();
  e.stopPropagation();
  const p = pointerPoint(e);
  const pts = noteUI.activeStroke.points;
  const prev = pts[pts.length - 1];
  const dist = Math.hypot(p.x - prev.x, p.y - prev.y);
  if (dist < 0.6) return;
  const smooth = { x: (prev.x + p.x) / 2, y: (prev.y + p.y) / 2, t: performance.now(), pressure: e.pressure || prev.pressure || 0.5 };
  pts.push(smooth);
  drawLatestStrokeSegment(noteUI.activeStroke);
  queueNoteDraftSave();
}

function onNotePointerUp(e) {
  if (!noteUI.drawing || e.pointerId !== noteUI.pointerId || !noteUI.activeStroke) return;
  e.preventDefault();
  e.stopPropagation();
  const pts = noteUI.activeStroke.points;
  if (pts.length > 1) drawStrokeTailSegment(noteUI.activeStroke);
  noteUI.strokeDraft.push(noteUI.activeStroke);
  if (noteUI.strokeDraft.length > NOTE_DRAFT_LIMIT) noteUI.strokeDraft.shift();
  noteUI.activeStroke = null;
  noteUI.drawing = false;
  noteUI.pointerId = null;
  if (noteUI.wrap.hasPointerCapture && noteUI.wrap.hasPointerCapture(e.pointerId)) {
    noteUI.wrap.releasePointerCapture(e.pointerId);
  }
  queueNoteDraftSave();
}

function strokeWidth(stroke, point, taper = 1) {
  const p = Number(point.pressure);
  const pressure = Number.isFinite(p) && p > 0 ? p : 0.45;
  return Math.max(0.8, stroke.base * (0.7 + pressure * 0.7) * taper);
}

function strokeMidpoint(a, b) {
  return {
    x: (a.x + b.x) / 2,
    y: (a.y + b.y) / 2,
    pressure: ((a.pressure || 0.5) + (b.pressure || 0.5)) / 2
  };
}

function drawStrokeDot(stroke, point) {
  const chunkIndex = Math.max(0, Math.floor(point.y / NOTE_CHUNK_HEIGHT));
  const drawRangeStart = Math.max(0, chunkIndex - 1);
  const drawRangeEnd = chunkIndex + 1;
  for (let i = drawRangeStart; i <= drawRangeEnd; i++) {
    const chunk = ensureNoteChunk(i);
    const yOff = i * NOTE_CHUNK_HEIGHT;
    const ctx = chunk.ctx;
    ctx.fillStyle = stroke.color;
    ctx.beginPath();
    ctx.arc(point.x, point.y - yOff, strokeWidth(stroke, point, 0.6), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawStrokeCurve(stroke, from, control, to, widthPoint, taper = 1) {
  const minY = Math.min(from.y, control.y, to.y);
  const maxY = Math.max(from.y, control.y, to.y);
  const startChunk = Math.max(0, Math.floor(minY / NOTE_CHUNK_HEIGHT) - 1);
  const endChunk = Math.floor(maxY / NOTE_CHUNK_HEIGHT) + 1;
  for (let i = startChunk; i <= endChunk; i++) {
    const chunk = ensureNoteChunk(i);
    const yOff = i * NOTE_CHUNK_HEIGHT;
    const ctx = chunk.ctx;
    ctx.strokeStyle = stroke.color;
    ctx.lineWidth = strokeWidth(stroke, widthPoint || control, taper);
    ctx.beginPath();
    ctx.moveTo(from.x, from.y - yOff);
    ctx.quadraticCurveTo(control.x, control.y - yOff, to.x, to.y - yOff);
    ctx.stroke();
  }
}

function drawLatestStrokeSegment(stroke) {
  const pts = stroke.points;
  if (pts.length < 2) return;
  if (pts.length === 2) {
    drawStrokeCurve(stroke, pts[0], pts[0], pts[1], pts[1], 0.72);
    return;
  }
  const p0 = pts[pts.length - 3];
  const p1 = pts[pts.length - 2];
  const p2 = pts[pts.length - 1];
  drawStrokeCurve(stroke, strokeMidpoint(p0, p1), p1, strokeMidpoint(p1, p2), p1, pts.length < 5 ? 0.8 : 1);
}

function drawStrokeTailSegment(stroke) {
  const pts = stroke.points;
  if (pts.length < 2) return;
  const p1 = pts[pts.length - 2];
  const p2 = pts[pts.length - 1];
  drawStrokeCurve(stroke, strokeMidpoint(p1, p2), p2, p2, p2, 0.9);
}

function queueNoteDraftSave() {
  const now = Date.now();
  if (now - state.notes.autosaveAt < 1500) return;
  state.notes.autosaveAt = now;
  if (noteUI.autosaveTimer) clearTimeout(noteUI.autosaveTimer);
  noteUI.autosaveTimer = setTimeout(() => {
    saveJSON(KEYS.noteDraft, {
      source_id: state.notes.activeSourceId,
      updated_at: nowISO(),
      strokes: noteUI.strokeDraft.slice(-120)
    });
  }, 220);
}

function attachSessionToBookContext(note, context) {
  if (!context || context.workspace_type !== "books" || !context.parent_item_id) return;
  const { payload } = ensureBooksPayload();
  const books = payload.books || [];
  const now = nowISO();
  const sessionMeta = {
    id: uid(),
    session_id: note.id,
    source_id: note.source_id,
    workspace_type: "books",
    parent_item_id: context.parent_item_id,
    chapter_id: context.chapter_id || null,
    chapter_name: context.chapter_name || null,
    created_at: note.created_at,
    timestamp: note.created_at,
    stroke_json: note.strokes,
    stroke_count: note.stroke_count,
    preview: note.preview || null
  };
  const nextBooks = books.map(book => book.id === context.parent_item_id ? {
    ...book,
    handwritten_sessions: [sessionMeta, ...(book.handwritten_sessions || [])],
    updated_at: now
  } : book);
  persistBooksPayload({
    ...payload,
    books: nextBooks,
    selected_book_id: context.parent_item_id,
    raw_handwritten_sessions: [sessionMeta, ...(payload.raw_handwritten_sessions || [])]
  });
}

function attachSessionToWorkspaceContext(note, context) {
  if (!context || !context.workspace_type || context.workspace_type === "books") return;
  const ws = ensureWorkspaceForKind(context.workspace_type);
  const sourceId = context.source_id || note.source_id || null;
  const sessionRow = createWorkspaceEntity("note_sessions", {
    workspace_id: ws.id,
    folder_id: context.folder_id || null,
    source_id: sourceId,
    started_at: note.created_at,
    ended_at: note.created_at,
    raw_handwritten_session_ref: note.id,
    manual_text_note: context.manual_text_note || null
  });
  createAttachmentMetadata({
    workspace_id: ws.id,
    session_id: sessionRow.id,
    source_id: sourceId,
    filename: `handwritten-${note.id}.json`,
    mime_type: "application/json",
    byte_size: JSON.stringify(note.strokes || []).length,
    local_ref: note.id
  });
}

function saveActiveNote() {
  if (!state.notes.activeSourceId) return toast("Pick a source first");
  if (!noteUI.strokeDraft.length) return toast("Add handwriting first");
  const preview = renderNotePreview();
  const context = noteUI.context ? { ...noteUI.context } : null;
  const note = {
    id: uid(),
    source_id: state.notes.activeSourceId,
    created_at: nowISO(),
    updated_at: nowISO(),
    stroke_count: noteUI.strokeDraft.length,
    strokes: noteUI.strokeDraft,
    preview,
    workspace_type: context?.workspace_type || null,
    parent_item_id: context?.parent_item_id || null,
    chapter_id: context?.chapter_id || null,
    chapter_name: context?.chapter_name || null
  };
  state.notes.sessions.unshift(note);
  persistNoteSessions();
  attachSessionToBookContext(note, context);
  attachSessionToWorkspaceContext(note, context);
  localStorage.removeItem(KEYS.noteDraft);
  closeHandwritingNote();
  if (context?.workspace_type === "books") {
    state.activeTab = "today";
    openWorkspace("books");
    toast("Handwritten note saved to this book");
    return;
  }
  showProcessingSoon(note);
  if (state.activeTab === "more") renderActive();
}

function renderNotePreview() {
  const c = document.createElement("canvas");
  c.width = 280; c.height = 220;
  const ctx = c.getContext("2d");
  ctx.fillStyle = "#f7f5ef";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  const minX = Math.min(...noteUI.strokeDraft.flatMap(s => s.points.map(p => p.x)));
  const maxX = Math.max(...noteUI.strokeDraft.flatMap(s => s.points.map(p => p.x)));
  const minY = Math.min(...noteUI.strokeDraft.flatMap(s => s.points.map(p => p.y)));
  const maxY = Math.max(...noteUI.strokeDraft.flatMap(s => s.points.map(p => p.y)));
  const w = Math.max(1, maxX - minX), h = Math.max(1, maxY - minY);
  const scale = Math.min((c.width - 24) / w, (c.height - 24) / h, 1);
  const ox = 12 - minX * scale, oy = 12 - minY * scale;
  noteUI.strokeDraft.forEach(stroke => {
    ctx.strokeStyle = stroke.color;
    const pts = stroke.points || [];
    if (!pts.length) return;
    const drawCurve = (from, control, to, widthPoint, taper = 1) => {
      ctx.lineWidth = Math.max(0.8, strokeWidth(stroke, widthPoint || control, taper) * scale);
      ctx.beginPath();
      ctx.moveTo(from.x * scale + ox, from.y * scale + oy);
      ctx.quadraticCurveTo(control.x * scale + ox, control.y * scale + oy, to.x * scale + ox, to.y * scale + oy);
      ctx.stroke();
    };
    if (pts.length === 1) {
      ctx.beginPath();
      ctx.fillStyle = stroke.color;
      ctx.arc(pts[0].x * scale + ox, pts[0].y * scale + oy, Math.max(0.8, strokeWidth(stroke, pts[0], 0.6) * scale), 0, Math.PI * 2);
      ctx.fill();
      return;
    }
    drawCurve(pts[0], pts[0], pts[1], pts[1], 0.72);
    for (let i = 2; i < pts.length; i++) {
      const prev = pts[i - 1];
      drawCurve(strokeMidpoint(pts[i - 2], prev), prev, strokeMidpoint(prev, pts[i]), prev, i < 4 ? 0.82 : 1);
    }
    drawCurve(strokeMidpoint(pts[pts.length - 2], pts[pts.length - 1]), pts[pts.length - 1], pts[pts.length - 1], pts[pts.length - 1], 0.9);
  });
  return c.toDataURL("image/webp", 0.72);
}

function openWorkspace(key) {
  state.todayView = "workspace";
  state.activeWorkspace = key;
  renderActive();
}

function closeWorkspace() {
  state.todayView = "dashboard";
  state.activeWorkspace = null;
  renderActive();
}

function workspaceData(kind) {
  const ws = ensureWorkspaceForKind(kind);
  const folders = readWorkspaceEntities("folders", f => f.workspace_id === ws.id);
  const sources = readWorkspaceEntities("sources", s => s.workspace_id === ws.id);
  const notes = readWorkspaceEntities("cleaned_note_blocks", n => n.workspace_id === ws.id);
  const sessions = readWorkspaceEntities("note_sessions", s => s.workspace_id === ws.id);
  const tags = readWorkspaceEntities("tags", t => t.workspace_id === ws.id);
  return { ws, folders, sources, notes, sessions, tags };
}

function workspaceFolderName(folders, folderId) {
  if (!folderId) return "No folder";
  return folders.find(f => f.id === folderId)?.name || "No folder";
}

function promptCreateWorkspaceFolder(kind) {
  const { ws } = workspaceData(kind);
  const name = (prompt("Folder name?") || "").trim();
  if (!name) return null;
  return createWorkspaceEntity("folders", { workspace_id: ws.id, name, parent_folder_id: null });
}

function promptCreateWorkspaceSource(kind, cfg = {}) {
  const { ws, folders } = workspaceData(kind);
  const name = (prompt(cfg.namePrompt || "Name?") || "").trim();
  if (!name) return null;
  const folderHint = folders.length ? `\nFolders:\n${folders.map((f, i) => `${i + 1}. ${f.name}`).join("\n")}` : "";
  const choice = (prompt(`Folder number (optional).${folderHint}`) || "").trim();
  const idx = Number(choice) - 1;
  const folder = idx >= 0 ? folders[idx] : null;
  return createWorkspaceEntity("sources", {
    workspace_id: ws.id,
    folder_id: folder?.id || null,
    name,
    source_type: cfg.sourceType || "note",
    status: cfg.status || "active",
    checkin_id: cfg.checkinId || null
  });
}

function promptWorkspaceManualNote(kind, source) {
  const text = (prompt("Manual note text?") || "").trim();
  if (!text) return null;
  appendWorkspaceNote(ensureWorkspaceForKind(kind).id, text, { source_id: source.id, created_by: "manual" });
  return text;
}

function ensureWorkspaceNoteSourceForEntry(kind, source) {
  const existing = state.notes.sources.find(s => s.workspace_type === kind && s.parent_item_id === source.id);
  if (existing) return existing;
  const noteSource = {
    id: uid(),
    name: source.name || `${WORKSPACE_KIND_LABELS[kind]} Item`,

    source_id: source.id,
    folder_id: source.folder_id || null,

  persistNoteSources();
  return noteSource;
}

function openWorkspaceHandwriting(kind, source) {

function booksWorkspaceRecord() {
  return ensureWorkspaceForKind("books");
}

function ensureBooksPayload() {
  const ws = booksWorkspaceRecord();
  const payload = ws.payload || {};
  let changed = false;
  if (!Array.isArray(payload.books)) { payload.books = []; changed = true; }
  if (!Array.isArray(payload.labels)) { payload.labels = []; changed = true; }
  if (!payload.sort) { payload.sort = "recently_edited"; changed = true; }
  if (!payload.filter_label) { payload.filter_label = "all"; changed = true; }
  if (!("selected_book_id" in payload)) { payload.selected_book_id = null; changed = true; }
  if (!Array.isArray(payload.raw_handwritten_sessions)) { payload.raw_handwritten_sessions = []; changed = true; }
  if (!payload.books.length && payload.book_title) {
    changed = true;
    payload.books.push({
      id: uid(),
      created_at: nowISO(),
      updated_at: nowISO(),
      title: payload.book_title || "Untitled Book",
      author: payload.author || "",
      cover_image_metadata: payload.cover_image_metadata || { placeholder: true, local_placeholder: "book-gradient-v1" },
      start_read_date: payload.start_read_date || null,
      finished_date: payload.finished_date || null,
      label_ids: [],
      chapters: Array.isArray(payload.chapters) ? payload.chapters : [],
      compiled_notes: Array.isArray(payload.compiled_notes) ? payload.compiled_notes.join("\n") : String(payload.compiled_notes || ""),
      manual_text_notes: Array.isArray(payload.manual_text_notes) ? payload.manual_text_notes : [],
      handwritten_sessions: []
    });
  }
  payload.books = payload.books.map(book => {
    if (Array.isArray(book.handwritten_sessions)) return book;
    changed = true;
    return { ...book, handwritten_sessions: [] };
  });
  ws.payload = payload;
  if (changed) updateWorkspaceEntity("workspaces", ws.id, { payload });
  return { ws, payload };
}

function persistBooksPayload(payloadPatch = {}) {
  const ws = booksWorkspaceRecord();
  const payload = Object.assign({}, ws.payload || {}, payloadPatch);
  updateWorkspaceEntity("workspaces", ws.id, { payload });
  return payload;
}

function booksSortedFiltered(payload) {
  const books = (payload.books || []).slice();
  const labels = payload.labels || [];
  const labelName = id => labels.find(l => l.id === id)?.name || "";
  let list = books;
  if (payload.filter_label && payload.filter_label !== "all") {
    list = list.filter(b => (b.label_ids || []).includes(payload.filter_label));
  }
  const sort = payload.sort || "recently_edited";
  list.sort((a, b) => {
    if (sort === "title") return String(a.title || "").localeCompare(String(b.title || ""));
    if (sort === "start_date") return String(b.start_read_date || "").localeCompare(String(a.start_read_date || ""));
    if (sort === "finished_date") return String(b.finished_date || "").localeCompare(String(a.finished_date || ""));
    if (sort === "label") return labelName(a.label_ids?.[0]).localeCompare(labelName(b.label_ids?.[0]));
    return String(b.updated_at || b.created_at || "").localeCompare(String(a.updated_at || a.created_at || ""));
  });
  return list;
}

function booksDocHTML(text) {

function ensureBookNoteSource(book) {

function calorieRangeState(current, target) {
  const ratio = target ? current / target : 0;
  const remaining = Math.max(0, Math.round(target - current));
  let key = "low";
  let label = "Low fuel";
  if (ratio >= 1.1) { key = "above"; label = "Above range"; }
  else if (ratio >= 0.9) { key = "range"; label = "In range"; }
  else if (ratio >= 0.7) { key = "close"; label = "Getting close"; }
  const note = remaining > 0 ? `${remaining} cal to goal` : `${Math.round(current - target)} cal over target`;
  return {
    key,
    label,
    note,
    barPct: clamp((ratio / 1.25) * 100, 0, 100)
  };
}

function proteinGoalState(current, target) {
  const ratio = target ? current / target : 0;
  const remaining = Math.max(0, Math.round(target - current));
  let key = "needs";
  let label = "Needs protein";
  if (ratio >= 1) { key = "met"; label = "Goal met"; }
  else if (ratio >= 0.9) { key = "almost"; label = "Almost there"; }
  else if (ratio >= 0.5) { key = "building"; label = "Building"; }
  return {
    key,
    label,
    note: remaining > 0 ? `${remaining}g to goal` : "Minimum covered",
    barPct: clamp(ratio * 100, 0, 100)
  };
}

function motionState(minutes, goal) {
  if (minutes >= goal) return { key: "complete", label: "Week complete" };
  if (minutes > 0) return { key: "progress", label: "In progress" };
  return { key: "none", label: "Not started" };
}

function workoutWeekData() {
  const workouts = state.data.Workout_Entries || [];
  const now = new Date();
  now.setHours(0,0,0,0);
  const mondayOffset = (now.getDay() + 6) % 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - mondayOffset);
  const labels = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  return labels.map((day, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const iso = d.toISOString().slice(0,10);
    const dayWorkouts = workouts.filter(w => isSameDay(w.date, iso));
    const minutes = sumBy(dayWorkouts, "duration");
    return {
      iso,
      day,
      completed: minutes > 0,
      minutes,
      isToday: isSameDay(iso, todayISO())
    };
  });
}

function currentWeekWorkouts() {
  const week = workoutWeekData().map(d => d.iso);
  return (state.data.Workout_Entries || []).filter(w => week.includes((w.date || "").slice(0,10)));
}

function bodyInsight(fuelKey, proteinKey, motionKey) {
  const fuelLow = fuelKey === "low" || fuelKey === "close";
  const proteinLow = proteinKey === "needs" || proteinKey === "building" || proteinKey === "almost";
  const motionDone = motionKey === "complete";
  if (fuelLow && proteinLow) return "Fuel and protein need attention next.";
  if (fuelKey === "range" && proteinLow) return "Fuel is on track. Protein needs attention.";
  if (!motionDone && !fuelLow && !proteinLow) return "Body basics look solid. Motion is the next move.";
  if ((fuelKey === "range" || fuelKey === "above") && !proteinLow && motionDone) return "Body goals are on track today.";
  if (fuelKey === "above" && proteinLow) return "Calories are above range, but protein still needs attention.";
  return "One clear next step is enough for now.";
}

function last7PillarSeries(pillarKey) {
  const out = last7PillarSeriesRaw(pillarKey);
  // Fill gaps for sparkline by carrying last known forward (visual continuity)
  let last = null;
  return out.map(v => { if (v != null) last = v; return last == null ? 0 : last; });
}

function last7PillarSeriesRaw(pillarKey) {
  const list = state.data.Pillar_Checkins || [];
  const out = [];
  for (let i = 6; i >= 0; i--) {
    const day = daysAgoISO(i);
    const todays = list.filter(r => isSameDay(r.date, day));
    if (todays.length) {
      const v = todays.reduce((s,r)=> s + (Number(r["pillar_"+pillarKey])||0), 0) / todays.length;
      out.push(v);
    } else out.push(null);
  }
  return out;
}
function trendDirection(series) {
  const valid = series.filter(v => v != null && v !== 0);
  if (valid.length < 2) return "flat";
  const half = Math.floor(valid.length / 2);
  const a = avg(valid.slice(0, half));
  const b = avg(valid.slice(half));
  const delta = b - a;
  if (delta >= 0.9) return "up";
  if (delta >= 0.35) return "up_slight";
  if (delta <= -0.9) return "down";
  if (delta <= -0.35) return "down_slight";
  return "flat";
}

function trendArrowMeta(trend) {
  if (trend === "up") return { arrow: "↑", label: "Improving", tone: "positive", color: "var(--green-500)" };
  if (trend === "up_slight") return { arrow: "↗", label: "Slightly improving", tone: "positive", color: "var(--green-500)" };
  if (trend === "down") return { arrow: "↓", label: "Declining", tone: "negative", color: "var(--red-500)" };
  if (trend === "down_slight") return { arrow: "↘", label: "Slightly declining", tone: "negative", color: "var(--red-500)" };
  return { arrow: "→", label: "Unchanged", tone: "neutral", color: "var(--accent)" };
}

function weeklyPlanProgress() {
  const plan = currentWeeklyPlan();
  const weekWorkouts = currentWeekWorkouts();
  const partCounts = workoutPartCounts(weekWorkouts);
  const targets = plan.bodyPartTargets || {};
  const targetNames = Object.keys(targets).filter(p => Number(targets[p]) > 0);
  const completedParts = targetNames.filter(p => (partCounts[p] || 0) >= Number(targets[p]));
  const weeklyMinutes = sumBy(weekWorkouts, "duration");
  const weeklyGoal = Number(plan.weeklyMinutes) || 300;
  const remainingParts = targetNames.filter(p => (partCounts[p] || 0) < Number(targets[p]));
  return {
    plan,
    minutesPct: clamp(weeklyMinutes / Math.max(1, weeklyGoal), 0, 1),
    minutesText: `${weeklyMinutes}/${weeklyGoal} min`,
    partsPct: targetNames.length ? completedParts.length / targetNames.length : 1,
    partsText: targetNames.length ? `${completedParts.length}/${targetNames.length} targets` : "No body-part targets",
    remainingParts: remainingParts.map(p => `${p} ${(partCounts[p] || 0)}/${Number(targets[p])}`),
    partCounts
  };
}

function jarSVG(kind, count) {
  const tint = kind === "w"
    ? "rgba(140,200,160,0.25)"
    : "rgba(220,140,130,0.25)";
  const tintEdge = kind === "w" ? "rgba(140,200,160,0.55)" : "rgba(220,140,130,0.55)";
  // Marbles inside the active jar.
  const max = 56;
  const visible = Math.min(count, max);
  let cards = "";
  const cls = kind === "l" ? "jar-marble l" : "jar-marble";
  for (let i = 0; i < visible; i++) {
    const row = Math.floor(i / 4);
    const col = i % 4;
    const bottomPct = 5 + row * 11;
    const leftPct = 4 + col * 23 + ((row % 2) * 7);
    const rot = ((i * 47) % 360);
    cards += `<div class="${cls}" style="bottom:${bottomPct}%; left:${leftPct}%; transform:rotate(${rot}deg)"></div>`;
  }
  return `
    <div class="jar-svg-wrap" data-jar-kind="${kind}">
      <svg class="jar-svg" viewBox="0 0 130 170" aria-hidden="true">
        <defs>
          <linearGradient id="jarGlass-${kind}" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0" stop-color="${tintEdge}"/>
            <stop offset="0.3" stop-color="${tint}"/>
            <stop offset="0.7" stop-color="${tint}"/>
            <stop offset="1" stop-color="${tintEdge}"/>
          </linearGradient>
          <linearGradient id="jarLid-${kind}" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="rgba(255,255,255,0.18)"/>
            <stop offset="1" stop-color="rgba(0,0,0,0.10)"/>
          </linearGradient>
        </defs>
        <!-- Lid -->
        <rect class="jar-lid-piece" x="30" y="6" width="70" height="14" rx="3" fill="url(#jarLid-${kind})" stroke="var(--jar-stroke)" stroke-width="1"/>
        <!-- Body -->
        <path d="M28 24 Q28 20 32 20 H98 Q102 20 102 24 V32
                 Q108 38 108 50 V148
                 Q108 162 96 162 H34
                 Q22 162 22 148 V50
                 Q22 38 28 32 Z"
              fill="url(#jarGlass-${kind})"
              stroke="var(--jar-stroke)" stroke-width="1.2"/>
        <!-- Highlight -->
        <path d="M34 38 Q30 50 30 80 V140" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M100 60 Q102 80 100 130" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
      <div class="jar-cards" aria-hidden="true">${cards}</div>
    </div>
  `;
}

function monthlyShelfJars() {
  const current = monthKey(new Date());
  const map = {};
  (state.data.Jar_Entries || []).forEach(j => {
    const key = monthKey(j.date || j.created_at);
    if (!key || key === current) return;
    const id = `${j.type}-${key}`;
    map[id] = map[id] || { id, type: j.type, month: key, label: monthName(key), entries: [] };
    map[id].entries.push(j);
  });
  return Object.values(map).sort((a,b) => b.month.localeCompare(a.month));
}

function monthKey(value) {
  if (!value) return "";
  const d = value instanceof Date ? value : new Date(String(value).slice(0,10) + "T00:00:00");
  if (isNaN(d.getTime())) return "";
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}

function monthName(value) {
  const key = typeof value === "string" ? value : monthKey(value);
  if (!key) return "";
  const [y,m] = key.split("-").map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString(undefined, { month: "short", year: "numeric" });
}

function animateTossIntoJar(kind, content) {
  // Set pending state BEFORE any render so the destination jar shows count-1 (flying marble fills the gap)
  state.pendingToss = { kind };

  // Single render: either tab switch or in-place re-render of the jar tab
  if (state.activeTab !== "jar") {
    switchTab("jar");
  } else {
    renderActive();
  }

  // Wait for layout to settle, then launch the flight
  setTimeout(() => {
    const k = kind.toLowerCase();
    const jarShell = document.querySelector(`#jar-${k}`);
    const jarWrap = jarShell && jarShell.querySelector(".jar-svg-wrap");
    const jarCards = jarShell && jarShell.querySelector(".jar-cards");
    const overlay = document.getElementById("toss-overlay");
    if (!jarWrap || !overlay) {
      // Fallback: clear pending and do a single render so state is consistent
      state.pendingToss = null;
      renderActive();
      return;
    }

    // Marble is 28px (matches .marble-3d). Center it on the start/target points.
    const MARBLE = 28;
    const HALF = MARBLE / 2;
    const start = { x: window.innerWidth / 2 - HALF, y: window.innerHeight / 2 - 140 };
    const target = jarWrap.getBoundingClientRect();
    const mouthX = target.left + target.width / 2 - HALF;
    const mouthY = target.top + target.height * 0.11;
    const settleY = target.top + target.height * 0.62;

    // Use the 3D marble class for the flight visual
    const marble = document.createElement("div");
    marble.className = "marble-3d" + (kind === "L" ? " l" : "");
    marble.style.left = start.x + "px";
    marble.style.top = start.y + "px";
    overlay.appendChild(marble);

    requestAnimationFrame(() => {
      if (jarShell) jarShell.classList.add("lid-open");

      // Phase 1: arc up & forward toward jar mouth, marble spinning
      const flight = marble.animate([
        { transform: "translate3d(0,0,0) rotateX(0deg) rotateZ(0deg) scale(1)", opacity: 1, offset: 0 },
        { transform: `translate3d(${(mouthX - start.x) * 0.55}px, ${mouthY - start.y - 160}px, 0) rotateX(180deg) rotateZ(${kind === "W" ? -90 : 90}deg) scale(1.02)`, opacity: 1, offset: .42, easing: "cubic-bezier(.18,.7,.3,1)" },
        { transform: `translate3d(${mouthX - start.x}px, ${mouthY - start.y - 8}px, 0) rotateX(360deg) rotateZ(${kind === "W" ? -180 : 180}deg) scale(.96)`, opacity: 1, offset: .62, easing: "cubic-bezier(.42,0,.7,1)" },
        // Phase 2: drop into jar with gravity
        { transform: `translate3d(${mouthX - start.x}px, ${settleY - start.y - 14}px, 0) rotateX(520deg) rotateZ(${kind === "W" ? -260 : 260}deg) scale(.78)`, opacity: 1, offset: .82, easing: "cubic-bezier(.55,.05,.7,1)" },
        // Phase 3: tiny bounce + fade as it merges with the resting marbles
        { transform: `translate3d(${mouthX - start.x + 4}px, ${settleY - start.y + 4}px, 0) rotateX(620deg) rotateZ(${kind === "W" ? -300 : 300}deg) scale(.7)`, opacity: .9, offset: .92, easing: "cubic-bezier(.4,.1,.6,1)" },
        { transform: `translate3d(${mouthX - start.x + 2}px, ${settleY - start.y + 8}px, 0) rotateX(660deg) rotateZ(${kind === "W" ? -320 : 320}deg) scale(.62)`, opacity: 0, offset: 1 }
      ], {
        duration: 1250,
        easing: "linear",
        fill: "forwards"
      });

      flight.onfinish = () => {
        marble.remove();
        if (jarShell) jarShell.classList.remove("lid-open");

        // Targeted DOM insert: append the new resting marble at the correct grid slot.
        // Grid: row = floor(i/4), col = i%4, bottomPct = 5 + row*11, leftPct = 4 + col*23 + (row%2)*7
        // The new index is the count BEFORE we insert (since pendingToss subtracted 1, current DOM has count-1 marbles).
        if (jarCards) {
          const i = jarCards.children.length; // == activeXxx.length - 1, which is the new marble's index
          const max = 56;
          if (i < max) {
            const row = Math.floor(i / 4);
            const col = i % 4;
            const bottomPct = 5 + row * 11;
            const leftPct = 4 + col * 23 + ((row % 2) * 7);
            const rot = ((i * 47) % 360);
            const newMarble = document.createElement("div");
            newMarble.className = "jar-marble settling" + (kind === "L" ? " l" : "");
            newMarble.style.bottom = bottomPct + "%";
            newMarble.style.left = leftPct + "%";
            newMarble.style.setProperty("--rest", `rotate(${rot}deg)`);
            newMarble.style.transform = `rotate(${rot}deg)`;
            jarCards.appendChild(newMarble);

            // Subtle bump on a neighbor for tactile feedback
            const neighbors = Array.from(jarCards.children).slice(-4, -1);
            const n = neighbors[Math.floor(Math.random() * neighbors.length)];
            if (n) {
              n.classList.add("bump");
              setTimeout(() => n.classList.remove("bump"), 360);
            }
          }
        }

        // Update count text only — no full re-render, no flicker.
        // Clear pending so the next render shows the true count
        state.pendingToss = null;
      };
    });
  }, 60);
}

function renderWorkouts(root) {
  const list = (state.data.Workout_Entries || []).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const week = currentWeekWorkouts();
  const last14 = list.filter(x => daysBetween(x.date, todayISO()) <= 13);
  const plan = weeklyPlanProgress();

  // Build last-7-days strip (oldest to newest, left to right)
  const today = new Date();
  const dayLabels = ["S","M","T","W","T","F","S"];
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const iso = d.toISOString().slice(0,10);
    const trained = list.some(w => w.date === iso);
    days.push({ iso, dnum: d.getDate(), label: dayLabels[d.getDay()], isToday: i === 0, trained });
  }
  const stripHTML = days.map(d => `
    <div class="day ${d.isToday ? "today" : ""} ${d.trained ? "trained" : ""}">
      <div class="dnum">${d.dnum}</div>
      <div>${d.label}</div>
    </div>
  `).join("");

  // Body part balance over last 14 days
  const counts = {};
  WORKOUT_CATEGORIES.forEach(c => counts[c] = 0);
  last14.forEach(w => workoutParts(w).forEach(p => { if (counts[p] != null) counts[p] += 1; }));
  const maxCount = Math.max(1, ...Object.values(counts));
  const sortedParts = WORKOUT_CATEGORIES.slice().sort((a,b) => counts[b] - counts[a]);
  const balanceHTML = sortedParts.map(p => {
    const c = counts[p];
    const pct = (c / maxCount) * 100;
    const cold = c === 0;
    return `
      <div class="balance-row ${cold ? "cold" : ""}">
        <div class="bname">${p}</div>
        <div class="btrack"><div class="bfill" style="width:${cold ? 6 : pct}%"></div></div>
        <div class="bcount">${c}</div>
      </div>
    `;
  }).join("");

  const weekMinutes = sumBy(week, "duration");
  const weekIntensity = avg(week.map(w => Number(w.intensity) || 0).filter(Boolean));

  root.innerHTML = `
    <div class="card">
      <div class="row-between mb-md">
        <div>
          <h3>Training week</h3>
          <div class="muted" style="font-size:13px">${weekMinutes}/${Number(plan.plan.weeklyMinutes)||300} min · avg intensity ${weekIntensity ? weekIntensity.toFixed(1).replace(".0","") : "—"}</div>
        </div>
        <button class="btn btn-sm btn-primary" data-add-workout>Workout</button>
      </div>
      <div class="weekly-strip">${stripHTML}</div>
      <div class="mini-plan mt-md">
        ${planItemHTML("Weekly minutes", plan.minutesText, plan.minutesPct)}
        ${planItemHTML("Body-part goals", plan.partsText, plan.partsPct)}
      </div>
      <div class="muted" style="font-size:13px;margin-top:10px">${plan.remainingParts.length ? "Still left: " + escapeHTML(plan.remainingParts.join(", ")) : "Workout goals are on track."}</div>
    </div>

    <div class="card mt-md">
      <h3>Body part balance</h3>
      <div class="muted" style="font-size:13px;margin-bottom:10px">Last 14 days. Cold rows are easy wins.</div>
      <div class="balance-list">${balanceHTML}</div>
    </div>

    <div class="section-title"><h4>Recent workouts</h4></div>
    ${renderWorkoutList(list.slice(0,8))}
  `;
  root.querySelector("[data-add-workout]").addEventListener("click", openWorkoutSheet);
}

function openWorkoutSheet() {
  const DURATIONS = [30, 45, 60, 80, 100];
  openSheet(`

    <div class="field">
      <label>Body parts <span class="muted" style="font-weight:400;font-size:12px" id="parts-counter">— none selected</span></label>
      <div class="chip-row" id="parts-chips">

    </div>

      <label>Duration <span class="muted" style="font-weight:400;font-size:12px" id="duration-display">— pick or type</span></label>
      <div class="duration-chips" id="duration-chips">
        ${DURATIONS.map(d => `<button type="button" class="dchip" data-dur="${d}">${d}m</button>`).join("")}
      </div>
      <input class="input mt-sm" id="workout-duration" inputmode="numeric" placeholder="Or type minutes" />
    </div>

    <div class="field">
      <label>Date</label>
      <input class="input" id="workout-date" type="date" value="${todayISO()}" />
    </div>

    <div class="field">
      <button type="button" class="small-link" id="toggle-notes">+ Add notes</button>
      <textarea class="input mt-sm" id="workout-notes" rows="2" placeholder="Optional — what you actually did" style="display:none"></textarea>
    </div>

    <div class="sheet-actions">
      <button class="btn btn-ghost" id="workout-cancel">Cancel</button>
      <div class="spacer"></div>
      <button class="btn btn-primary" id="workout-save">Save</button>
    </div>
  `, () => {
    const selected = new Set();
    const counter = document.getElementById("parts-counter");
    const updateCounter = () => {
      const arr = [...selected];
      counter.textContent = arr.length
        ? `— ${arr.length}: ${arr.slice(0,3).join(", ")}${arr.length > 3 ? "…" : ""}`
        : "— none selected";
      renderPerPartIntensity();
    };
    const renderPerPartIntensity = () => {
      const host = document.getElementById("per-part-intensity");
      if (!host) return;
      const list = [...selected];
      host.innerHTML = list.length
        ? list.map(c => `
          <div class="slider-row mb-sm">
            <span style="min-width:92px;font-size:13px;color:var(--text-soft)">${c}</span>
            <input type="range" id="part-intensity-${cssSafe(c)}" min="1" max="10" value="7" />
            <span class="val" id="part-intensity-${cssSafe(c)}-val">7</span>
          </div>`).join("")
        : `<div class="empty">Pick body parts first.</div>`;
      list.forEach(c => bindRangeValue(`part-intensity-${cssSafe(c)}`, `part-intensity-${cssSafe(c)}-val`, 10, "/10"));
    };

    document.querySelectorAll("[data-workout-part]").forEach(b => {
      b.addEventListener("click", () => {
        selected.has(b.value) ? selected.delete(b.value) : selected.add(b.value);
        b.classList.toggle("active", selected.has(b.value));
        updateCounter();
      });
    });

    const durInput = document.getElementById("workout-duration");
    const durDisplay = document.getElementById("duration-display");
    const dchips = [...document.querySelectorAll("#duration-chips .dchip")];
    dchips.forEach(c => c.addEventListener("click", () => {
      const v = Number(c.dataset.dur);
      durInput.value = v;
      dchips.forEach(x => x.classList.remove("active"));
      c.classList.add("active");
      durDisplay.textContent = `— ${v} min`;
    }));
    durInput.addEventListener("input", () => {
      const v = Number(durInput.value);
      dchips.forEach(c => c.classList.toggle("active", Number(c.dataset.dur) === v));
      durDisplay.textContent = v ? `— ${v} min` : "— pick or type";
    });

    const notesBtn = document.getElementById("toggle-notes");
    const notesEl = document.getElementById("workout-notes");
    notesBtn.addEventListener("click", () => {
      notesEl.style.display = "block";
      notesBtn.style.display = "none";
      notesEl.focus();
    });

    document.getElementById("workout-cancel").addEventListener("click", closeSheet);
    document.getElementById("workout-save").addEventListener("click", () => {
      const list = [...selected];
      if (!list.length) return toast("Pick at least one body part");
      const duration = Number(durInput.value) || 0;
      if (!duration) return toast("Set duration");
      const intensityMap = {};
      list.forEach(c => {
        const el = document.getElementById(`part-intensity-${cssSafe(c)}`);
        intensityMap[c] = el ? (Number(el.value) || 7) : 7;
      });
      const averageIntensity = Math.round(avg(Object.values(intensityMap)) * 10) / 10;
      insertRow("Workout_Entries", {
        category: list.join("|"),
        duration,
        intensity: averageIntensity,
        intensity_by_category: JSON.stringify(intensityMap),
        notes: notesEl.value.trim(),
        date: document.getElementById("workout-date").value || todayISO()
      });
      closeSheet();
      renderActive();
      toast("Workout saved");
    });
  });
}

function renderWeight(root) {
  const list = (state.data.Weight_Entries || []).slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  const latest = latestWeight();
  const last7 = list.filter(x => daysBetween(x.date, todayISO()) <= 6).map(x=>Number(x.weight)||0).filter(Boolean);
  const last30 = list.filter(x => daysBetween(x.date, todayISO()) <= 29);
  const selectedRange = WEIGHT_RANGES.find(r => r.key === state.settings.weightRange) || WEIGHT_RANGES[4];
  const rangedList = filterWeightEntriesByRange(list, selectedRange);
  const rolling = rollingWeightAverage(rangedList, 7);
  const change = last30.length > 1 ? Number(last30[last30.length-1].weight) - Number(last30[0].weight) : null;
  root.innerHTML = `
    <div class="card">
      <div class="row-between mb-md"><div><h3>7-day rolling average</h3><div class="muted" style="font-size:13px">${latest ? "Latest " + fmtRelDay(latest.date) : "No entry yet"}</div></div><button class="btn btn-sm btn-primary" data-add-weight>Weight</button></div>
      <div class="stat-row">
        <div class="stat-tile"><div class="label">Latest</div><div class="value">${latest ? Number(latest.weight).toFixed(1) : "—"}</div><div class="sub">weight</div></div>
        <div class="stat-tile"><div class="label">7-day avg</div><div class="value">${last7.length ? avg(last7).toFixed(1) : "—"}</div><div class="sub">${last7.length} entries</div></div>
        <div class="stat-tile"><div class="label">30-day</div><div class="value">${change == null ? "—" : (change>0?"+":"") + change.toFixed(1)}</div><div class="sub">change</div></div>
      </div>
      <div class="chip-row chart-range" aria-label="Weight chart date range">
        ${WEIGHT_RANGES.map(r => `<button class="chip ${selectedRange.key===r.key?'active':''}" data-weight-range="${r.key}">${r.label}</button>`).join("")}
      </div>
      <canvas class="wide-chart" id="weight-chart" style="width:100%;height:190px"></canvas>
      <div class="muted" style="font-size:12px;margin-top:8px">Graph shows 7-day rolling average for ${selectedRange.label.toLowerCase()}.</div>
    </div>
    <div class="section-title"><h4>Recent weights</h4></div>
    ${list.length ? `<div class="list weight-history">${list.slice(-10).reverse().map((w, i, arr)=> {
      const prev = arr[i+1];
      const delta = prev ? Number(w.weight) - Number(prev.weight) : null;
      return `<div class="list-row ${w.sync_status||'saved'}">
        <span class="sync-dot"></span>
        <div class="grow"><div class="title">${Number(w.weight).toFixed(1)} lb</div><div class="meta">${fmtRelDay(w.date)}</div></div>
        <div class="right">${delta == null ? "—" : (delta > 0 ? "+" : "") + delta.toFixed(1)}</div>
      </div>`;
    }).join("")}</div>` : `<div class="empty">No weight entries yet.</div>`}
  `;
  root.querySelector("[data-add-weight]").addEventListener("click", openWeightSheet);
  root.querySelectorAll("[data-weight-range]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.settings.weightRange = btn.dataset.weightRange;
      persistSettings();
      renderWeight(root);
    });
  });
  const c = root.querySelector("#weight-chart");
  if (c) drawWeightChart(c, rolling, selectedRange);
}

/* ----------------------------------------------------------
   Utilities used by renderers (added in next stage)
   ---------------------------------------------------------- */
function escapeHTML(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]); }
function sumBy(list, key) { return list.reduce((s, x) => s + (Number(x[key]) || 0), 0); }
function avg(list) { return list.length ? list.reduce((s,v)=>s+v,0)/list.length : 0; }
function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

function calorieTier(cals) {
  if (cals >= CAL_STAR_MIN) return "star";
  if (cals >= CAL_GOAL) return "goal";
  if (cals >= CAL_BAD_MAX + 1) return "weak";
  return "bad";
}
function tierLabel(t) {
  return ({ bad: "Bad", weak: "Weak", goal: "Goal", star: "Star" })[t] || "—";
}

function todaysFood()   { return (state.data.Food_Entries   || []).filter(r => isSameDay(r.date, todayISO())); }
function todaysWorkouts(){ return (state.data.Workout_Entries|| []).filter(r => isSameDay(r.date, todayISO())); }
function todaysJar()    { return (state.data.Jar_Entries    || []).filter(r => isSameDay(r.date, todayISO())); }
function latestWeight() {
  const list = (state.data.Weight_Entries || []).slice().sort((a,b)=> (b.date||"").localeCompare(a.date||""));
  return list[0];
}
function daysBetween(a, b) {
  if (!a || !b) return Infinity;
  const da = new Date(a.slice(0,10) + "T00:00:00");
  const db = new Date(b.slice(0,10) + "T00:00:00");
  return Math.max(0, Math.round((db - da) / 86400000));
}
function weeklyAverage(table, key) {
  const list = (state.data[table] || []).filter(x => daysBetween(x.date, todayISO()) <= 6);
  const totals = [];
  for (let i = 6; i >= 0; i--) {
    const day = daysAgoISO(i);
    totals.push(sumBy(list.filter(x => isSameDay(x.date, day)), key));
  }
  return avg(totals);
}
function recentWorkoutCategories(list) {
  return [...new Set(list.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).flatMap(x => workoutParts(x)).filter(Boolean))];
}
function workoutParts(w) {
  if (!w) return [];
  if (Array.isArray(w.categories)) return w.categories;
  return String(w.category || "").split("|").map(x => x.trim()).filter(Boolean);
}
function workoutPartCounts(workouts) {
  const counts = {};
  WORKOUT_CATEGORIES.forEach(c => counts[c] = 0);
  (workouts || []).forEach(w => workoutParts(w).forEach(p => {
    counts[p] = (counts[p] || 0) + 1;
  }));
  return counts;
}
function workoutIntensityMap(w) {
  try {
    if (typeof w.intensity_by_category === "string" && w.intensity_by_category.trim()) return JSON.parse(w.intensity_by_category);
    if (w.intensity_by_category && typeof w.intensity_by_category === "object") return w.intensity_by_category;
  } catch {}
  return {};
}
function workoutIntensityFor(w, category) {
  const map = workoutIntensityMap(w);
  return Number(map[category]) || Number(w.intensity) || 0;
}
function workoutIntensitySummary(w) {
  const parts = workoutParts(w);
  if (!parts.length) return `intensity ${Number(w.intensity)||0}/10`;
  return parts.map(p => `${p} ${workoutIntensityFor(w,p)}/10`).join(" · ");
}
function cssSafe(value) {
  return String(value).replace(/[^a-z0-9_-]/gi, "_");
}
function filterWeightEntriesByRange(list, range) {
  if (!range || !Number.isFinite(range.days)) return list;
  return list.filter(x => daysBetween(x.date, todayISO()) <= range.days);
}
function rollingWeightAverage(list, windowSize=7) {
  const entries = list
    .filter(x => Number.isFinite(Number(x.weight)) && Number(x.weight) > 0)
    .map(x => ({ date: (x.date || "").slice(0,10), raw: Number(x.weight) }));
  return entries.map((entry, i) => {
    const slice = entries.slice(Math.max(0, i - windowSize + 1), i + 1).map(x => x.raw);
    return { date: entry.date, value: Math.round(avg(slice) * 10) / 10, raw: entry.raw };
  });
}
function workoutHeatmap() {
  const workouts = state.data.Workout_Entries || [];
  const cells = [];
  for (let i = 27; i >= 0; i--) {
    const day = daysAgoISO(i);
    const minutes = sumBy(workouts.filter(w => isSameDay(w.date, day)), "duration");
    const level = minutes >= 90 ? 4 : minutes >= 60 ? 3 : minutes >= 30 ? 2 : minutes > 0 ? 1 : 0;
    cells.push(`<div class="cell" data-l="${level}" title="${day}: ${minutes} minutes"></div>`);
  }
  return cells.join("");
}
function bindRangeValue(rangeId, valueId, max=10, suffix="") {
  const r = document.getElementById(rangeId);
  const v = document.getElementById(valueId);
  if (!r || !v) return;
  const sync = () => {
    v.textContent = r.value + suffix;
    const min = Number(r.min) || 0;
    const maxValue = Number(r.max) || max;
    const pct = ((Number(r.value) - min) / Math.max(1, maxValue - min)) * 100;
    r.style.setProperty("--fill", `${clamp(pct, 0, 100)}%`);
  };
  r.addEventListener("input", sync);
  sync();
}

/* ----------------------------------------------------------
   Sparkline + chart helpers
   ---------------------------------------------------------- */
function drawSpark(canvas, points, opts={}) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0,0,w,h);
  if (!points.length) return;
  const min = Math.min(...points, opts.min ?? Infinity);
  const max = Math.max(...points, opts.max ?? -Infinity);
  const lo = isFinite(min) ? min : 0;
  const hi = isFinite(max) ? max : 1;
  const range = hi - lo || 1;
  const pad = 3;
  const pts = points.map((v, i) => {
    const x = pad + (i/(Math.max(1,points.length-1))) * (w - pad*2);
    const y = h - pad - ((v - lo)/range) * (h - pad*2);
    return [x,y];
  });
  const accent = getCss("--accent");
  const grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, hexA(accent, 0.30));
  grad.addColorStop(1, hexA(accent, 0));
  ctx.beginPath();
  ctx.moveTo(pts[0][0], h-pad);
  pts.forEach(p => ctx.lineTo(p[0], p[1]));
  ctx.lineTo(pts[pts.length-1][0], h-pad);
  ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = accent;
  ctx.lineWidth = 1.5;
  ctx.lineJoin = "round";
  ctx.beginPath();
  pts.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));
  ctx.stroke();
}

function drawWeightChart(canvas, points, selectedRange) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);
  if (!points.length) {
    ctx.fillStyle = getCss("--muted");
    ctx.font = "13px system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("No weight entries in this range", w / 2, h / 2);
    return;
  }

  const values = points.map(p => Number(p.value ?? p)).filter(v => Number.isFinite(v));
  if (!values.length) return;

  const padL = 38, padR = 10, padT = 14, padB = 26;
  const minRaw = Math.min(...values);
  const maxRaw = Math.max(...values);
  const lo = Math.floor(minRaw - 1);
  const hi = Math.ceil(maxRaw + 1);
  const range = hi - lo || 1;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;
  const pts = points.map((p, i) => {
    const v = Number(p.value ?? p);
    return [
    padL + (i / Math.max(1, points.length - 1)) * plotW,
    padT + (1 - ((v - lo) / range)) * plotH
    ];
  });

  ctx.strokeStyle = hexA(getCss("--muted"), 0.22);
  ctx.lineWidth = 1;
  ctx.fillStyle = getCss("--muted");
  ctx.font = "11px system-ui";
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";
  [lo, (lo + hi) / 2, hi].forEach(v => {
    const y = padT + (1 - ((v - lo) / range)) * plotH;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    ctx.fillText(v.toFixed(0), padL - 8, y);
  });
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  const firstDate = points[0]?.date;
  const lastDate = points[points.length - 1]?.date;
  ctx.fillText(firstDate ? fmtDate(firstDate) : (selectedRange?.label || ""), padL + 6, h - padB + 8);
  ctx.fillText(lastDate ? fmtDate(lastDate) : "Today", w - padR - 18, h - padB + 8);

  const grad = ctx.createLinearGradient(0, padT, 0, h - padB);
  grad.addColorStop(0, hexA(getCss("--accent"), 0.26));
  grad.addColorStop(1, hexA(getCss("--accent"), 0));
  ctx.beginPath();
  ctx.moveTo(pts[0][0], h - padB);
  drawSmoothPath(ctx, pts);
  ctx.lineTo(pts[pts.length - 1][0], h - padB);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.strokeStyle = getCss("--accent");
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.beginPath();
  drawSmoothPath(ctx, pts);
  ctx.stroke();
}

function drawSmoothPath(ctx, pts) {
  if (!pts.length) return;
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) {
    const prev = pts[i - 1];
    const cur = pts[i];
    const midX = (prev[0] + cur[0]) / 2;
    const midY = (prev[1] + cur[1]) / 2;
    ctx.quadraticCurveTo(prev[0], prev[1], midX, midY);
  }
  const last = pts[pts.length - 1];
  ctx.lineTo(last[0], last[1]);
}
