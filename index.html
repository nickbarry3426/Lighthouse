<!doctype html>
<html lang="en" data-theme="system">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b1428" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#f7f6f2" media="(prefers-color-scheme: light)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Lighthouse" />
<link rel="manifest" href="manifest.json?v=2.1.0" />
<title>Lighthouse</title>
<style>
/* ============================================================
   Design tokens — Navy + Gold
   ============================================================ */
:root {
  --navy-50:  #eef1f7;
  --navy-100: #d6dde9;
  --navy-200: #a9b6cf;
  --navy-300: #6c80a3;
  --navy-500: #2a3a5c;
  --navy-600: #1d2a47;
  --navy-700: #142035;
  --navy-800: #0e1828;
  --navy-900: #0b1428;
  --navy-950: #060c1a;

  --gold-200: #f1e0b8;
  --gold-300: #e6c98a;
  --gold-400: #d4ae5e;
  --gold-500: #b88e3a;
  --gold-600: #936e26;

  --green-300: #9ec9a8;
  --green-500: #5a9a6e;
  --red-300:   #e2a39a;
  --red-500:   #c8584a;
  --amber-400: #e0a64a;

  --radius-sm: 12px;
  --radius:    18px;
  --radius-lg: 24px;
  --radius-xl: 32px;

  --ease: cubic-bezier(.22,.61,.36,1);
  --ease-out: cubic-bezier(.16,1,.3,1);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);

  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
  --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, monospace;

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* Light */
html[data-theme="light"], html[data-theme="system"] {
  color-scheme: light;
  --bg:        #f7f6f2;
  --bg-elev:   #ffffff;
  --bg-soft:   #efece4;
  --surface:   rgba(255,255,255,0.7);
  --surface-2: rgba(255,255,255,0.92);
  --border:    rgba(20,32,53,0.10);
  --border-strong: rgba(20,32,53,0.18);
  --text:      #0e1828;
  --text-soft: #2a3a5c;
  --muted:     #6c7892;
  --primary:   var(--navy-700);
  --primary-soft: var(--navy-500);
  --accent:    var(--gold-500);
  --accent-soft: var(--gold-400);
  --accent-glow: rgba(184,142,58,0.18);
  --glass:     rgba(255,255,255,0.55);
  --glass-stroke: rgba(20,32,53,0.06);
  --shadow-sm: 0 1px 2px rgba(14,24,40,0.05), 0 2px 6px rgba(14,24,40,0.04);
  --shadow:    0 1px 2px rgba(14,24,40,0.06), 0 8px 24px rgba(14,24,40,0.07);
  --shadow-lg: 0 1px 2px rgba(14,24,40,0.08), 0 24px 60px rgba(14,24,40,0.12);
  --grad-bg:
    radial-gradient(900px 600px at 8% -10%, rgba(184,142,58,0.10), transparent 60%),
    radial-gradient(900px 600px at 110% 110%, rgba(20,32,53,0.06), transparent 60%),
    linear-gradient(180deg, #faf9f4, #f3f0e8);
  --jar-glass: rgba(255,255,255,0.55);
  --jar-stroke: rgba(20,32,53,0.18);
}
/* Dark */
html[data-theme="dark"] {
  color-scheme: dark;
  --bg:        var(--navy-900);
  --bg-elev:   var(--navy-800);
  --bg-soft:   var(--navy-700);
  --surface:   rgba(255,255,255,0.04);
  --surface-2: rgba(255,255,255,0.07);
  --border:    rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.16);
  --text:      #f1ede2;
  --text-soft: #d3d0c5;
  --muted:     #8e93a3;
  --primary:   var(--navy-200);
  --primary-soft: var(--navy-300);
  --accent:    var(--gold-400);
  --accent-soft: var(--gold-300);
  --accent-glow: rgba(212,174,94,0.18);
  --glass:     rgba(20,32,53,0.55);
  --glass-stroke: rgba(255,255,255,0.06);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
  --shadow:    0 1px 2px rgba(0,0,0,0.5), 0 14px 40px rgba(0,0,0,0.45);
  --shadow-lg: 0 1px 2px rgba(0,0,0,0.6), 0 30px 70px rgba(0,0,0,0.55);
  --grad-bg:
    radial-gradient(1000px 700px at 8% -10%, rgba(212,174,94,0.10), transparent 60%),
    radial-gradient(900px 700px at 110% 110%, rgba(42,58,92,0.5), transparent 60%),
    linear-gradient(180deg, var(--navy-900), var(--navy-950));
  --jar-glass: rgba(255,255,255,0.06);
  --jar-stroke: rgba(255,255,255,0.18);
}
@media (prefers-color-scheme: dark) {
  html[data-theme="system"] {
    color-scheme: dark;
    --bg:        var(--navy-900);
    --bg-elev:   var(--navy-800);
    --bg-soft:   var(--navy-700);
    --surface:   rgba(255,255,255,0.04);
    --surface-2: rgba(255,255,255,0.07);
    --border:    rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --text:      #f1ede2;
    --text-soft: #d3d0c5;
    --muted:     #8e93a3;
    --primary:   var(--navy-200);
    --primary-soft: var(--navy-300);
    --accent:    var(--gold-400);
    --accent-soft: var(--gold-300);
    --accent-glow: rgba(212,174,94,0.18);
    --glass:     rgba(20,32,53,0.55);
    --glass-stroke: rgba(255,255,255,0.06);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
    --shadow:    0 1px 2px rgba(0,0,0,0.5), 0 14px 40px rgba(0,0,0,0.45);
    --shadow-lg: 0 1px 2px rgba(0,0,0,0.6), 0 30px 70px rgba(0,0,0,0.55);
    --grad-bg:
      radial-gradient(1000px 700px at 8% -10%, rgba(212,174,94,0.10), transparent 60%),
      radial-gradient(900px 700px at 110% 110%, rgba(42,58,92,0.5), transparent 60%),
      linear-gradient(180deg, var(--navy-900), var(--navy-950));
    --jar-glass: rgba(255,255,255,0.06);
    --jar-stroke: rgba(255,255,255,0.18);
  }
}

/* ============================================================
   Base
   ============================================================ */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  margin: 0;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.5;
  background: var(--grad-bg);
  background-attachment: fixed;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
button { font: inherit; color: inherit; cursor: pointer; background: none; border: none; padding: 0; }
input, textarea, select { font: inherit; color: inherit; }
::selection { background: var(--accent-glow); color: var(--text); }

h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.01em; margin: 0; }
h1 { font-size: clamp(26px, 5vw, 34px); letter-spacing: -0.02em; }
h2 { font-size: 22px; }
h3 { font-size: 17px; }
h4 { font-size: 14px; color: var(--muted); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }

.muted { color: var(--muted); }
.hidden { display: none !important; }

/* ============================================================
   App shell
   ============================================================ */
#app {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top);
}

.tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 40;
  padding: 8px 10px calc(8px + var(--safe-bottom));
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border-top: 1px solid var(--glass-stroke);
}
.tabbar-inner {
  max-width: 720px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}
.tab-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 4px 6px;
  border-radius: 12px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: color .25s var(--ease), background .25s var(--ease), transform .15s var(--ease);
}
.tab-btn svg { width: 22px; height: 22px; stroke-width: 1.6; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }
.tab-btn.active { color: var(--text); }
.tab-btn.active svg { stroke: var(--accent); }
.tab-btn:active { transform: scale(0.94); }

.appbar {
  position: sticky;
  top: 0;
  z-index: 30;
  padding: 14px 18px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background: linear-gradient(180deg, var(--bg) 60%, transparent);
}
.appbar-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.appbar-sub {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.appbar-actions { display: flex; gap: 8px; }

.icon-btn {
  width: 38px; height: 38px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  transition: background .25s var(--ease), border-color .25s var(--ease), transform .15s var(--ease);
}
.icon-btn:hover { background: var(--surface-2); }
.icon-btn:active { transform: scale(0.94); }
.icon-btn svg { width: 18px; height: 18px; stroke: var(--text-soft); stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }

main.scroll {
  flex: 1;
  max-width: 820px;
  width: 100%;
  margin: 0 auto;
  padding: 8px 18px calc(104px + var(--safe-bottom));
}

/* ============================================================
   Cards
   ============================================================ */
.card {
  position: relative;
  background: linear-gradient(180deg, var(--surface-2), var(--surface));
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px;
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
}
.card.solid { background: var(--bg-elev); }
.card.padded { padding: 22px; }
.card + .card { margin-top: 14px; }
.card .card-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.card .card-head h3 { font-size: 15px; font-weight: 600; }
.card .card-head .sub { font-size: 12px; color: var(--muted); }

.section-title {
  display: flex; align-items: baseline; justify-content: space-between;
  margin: 22px 4px 10px;
}
.section-title h4 { color: var(--muted); }
.section-title a, .section-title button {
  color: var(--accent); font-size: 13px; font-weight: 500;
}

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 18px;
  border-radius: 14px;
  background: var(--surface-2);
  border: 1px solid var(--border-strong);
  color: var(--text);
  font-size: 14px; font-weight: 500;
  transition: transform .15s var(--ease), background .25s var(--ease), border-color .25s var(--ease);
}
.btn:hover { background: var(--surface); }
.btn:active { transform: translateY(1px) scale(0.99); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

.btn-primary {
  background: linear-gradient(180deg, var(--navy-500), var(--navy-700));
  color: #f1ede2;
  border-color: rgba(255,255,255,0.06);
  box-shadow: 0 1px 0 rgba(255,255,255,0.10) inset, 0 6px 18px rgba(20,32,53,0.25);
}
html[data-theme="light"] .btn-primary,
html[data-theme="system"] .btn-primary {
  background: linear-gradient(180deg, var(--navy-600), var(--navy-700));
  color: #f1ede2;
}
.btn-gold {
  background: linear-gradient(180deg, var(--gold-300), var(--gold-500));
  color: #1c150a;
  border-color: rgba(0,0,0,0.06);
  box-shadow: 0 1px 0 rgba(255,255,255,0.30) inset, 0 6px 18px var(--accent-glow);
}
.btn-ghost { background: transparent; }
.btn-block { width: 100%; }
.btn-sm { padding: 10px 14px; font-size: 14px; border-radius: 12px; }

/* Quick add grid on Today */
.quick-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.quick-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  min-height: 92px;
  padding: 18px 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-soft);
  font-size: 14px; font-weight: 600;
  transition: transform .15s var(--ease), background .25s var(--ease), border-color .25s var(--ease);
}
.quick-btn svg { width: 28px; height: 28px; stroke: var(--accent); stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.quick-btn:hover { background: var(--surface); border-color: var(--border-strong); }
.quick-btn:active { transform: scale(0.97); }

/* ============================================================
   Stat tiles + progress
   ============================================================ */
.stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.stat-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 14px;
}
.stat-tile .label {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.stat-tile .value {
  font-family: var(--font-display);
  font-size: clamp(27px, 7vw, 38px);
  font-weight: 600;
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
}
.stat-tile .sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

.progress-card .progress-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 10px;
}
.progress-card .num {
  font-family: var(--font-display);
  font-size: clamp(36px, 9vw, 54px);
  font-weight: 600;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.progress-card .num .denom { color: var(--muted); font-size: 16px; font-weight: 500; }
.progress-card .tier {
  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 99px;
  background: var(--surface-2); color: var(--text-soft);
  border: 1px solid var(--border);
}
.tier.bad   { color: var(--red-500);   border-color: color-mix(in oklab, var(--red-500) 30%, var(--border)); }
.tier.weak  { color: var(--amber-400); border-color: color-mix(in oklab, var(--amber-400) 30%, var(--border)); }
.tier.goal  { color: var(--green-500); border-color: color-mix(in oklab, var(--green-500) 30%, var(--border)); }
.tier.star  { color: var(--accent);    border-color: color-mix(in oklab, var(--accent) 35%, var(--border)); background: var(--accent-glow); }

.bar {
  position: relative;
  height: 14px;
  background: var(--surface-2);
  border-radius: 99px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.bar-fill {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--accent-soft), var(--accent));
  border-radius: 99px;
  width: var(--w, 0%);
  transition: width .8s var(--ease-out);
}
.bar-fill.protein { background: linear-gradient(90deg, var(--green-300), var(--green-500)); }
.bar-fill.tier-bad { background: linear-gradient(90deg, var(--red-300), var(--red-500)); }
.bar-fill.tier-weak { background: linear-gradient(90deg, #f1c887, var(--amber-400)); }
.bar-fill.tier-goal { background: linear-gradient(90deg, var(--green-300), var(--green-500)); }
.bar-fill.tier-star { background: linear-gradient(90deg, var(--gold-300), var(--gold-500)); }

.bar-ticks {
  position: relative;
  height: 14px; margin-top: 4px;
  font-size: 10px; color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.bar-ticks span { position: absolute; transform: translateX(-50%); }

/* ============================================================
   Pillar cards
   ============================================================ */
.pillar-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.pillar-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
  transition: background .25s var(--ease), border-color .25s var(--ease), transform .15s var(--ease);
}
.pillar-card:active { transform: scale(0.98); }
.pillar-card .top {
  display: flex; justify-content: space-between; align-items: baseline;
}
.pillar-card .name { font-size: 13px; font-weight: 500; }
.pillar-card .avg {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 600;
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
}
.pillar-card .trend-line { height: 26px; }
.pillar-card .status {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--muted);
}
.pillar-card .status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.pillar-card .status.up    .dot { background: var(--green-500); }
.pillar-card .status.down  .dot { background: var(--red-500); }
.pillar-card .status.flat  .dot { background: var(--accent); }

/* ============================================================
   Lists
   ============================================================ */
.list { display: flex; flex-direction: column; gap: 8px; }
.list-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
}
.list-row .grow { flex: 1; min-width: 0; }
.list-row .title { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.list-row .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.list-row .right { color: var(--text-soft); font-variant-numeric: tabular-nums; font-size: 13px; }
.list-row.syncing { opacity: 0.7; }
.list-row .sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--muted);
}
.list-row.syncing .sync-dot { background: var(--amber-400); animation: pulse 1.4s var(--ease) infinite; }
.list-row.unsaved .sync-dot { background: var(--red-500); }
.list-row.saved   .sync-dot { background: transparent; border: 1px solid var(--border); }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}

.empty {
  text-align: center;
  padding: 28px 14px;
  color: var(--muted);
  font-size: 14px;
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}

/* ============================================================
   Sub-nav (segmented)
   ============================================================ */
.segmented {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 1fr;
  gap: 4px;
  padding: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 14px;
}
.segmented button {
  padding: 8px 10px;
  font-size: 13px; font-weight: 500;
  color: var(--muted);
  border-radius: 9px;
  transition: background .25s var(--ease), color .25s var(--ease);
}
.segmented button.active {
  background: var(--bg-elev);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

/* ============================================================
   Forms / inputs
   ============================================================ */
.field { margin-bottom: 12px; }
.field label {
  display: block; font-size: 13px; color: var(--text-soft);
  margin-bottom: 6px;
}
.input, textarea.input, select.input {
  width: 100%;
  padding: 12px 14px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 15px;
  transition: border-color .2s var(--ease), background .2s var(--ease), box-shadow .2s var(--ease);
}
.input:focus, textarea.input:focus, select.input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-glow);
}
textarea.input { min-height: 96px; resize: vertical; line-height: 1.5; }
.field-row { display: flex; gap: 8px; }
.field-row > * { flex: 1; }

.slider-row {
  display: flex; align-items: center; gap: 14px;
}
.slider-row .val {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  min-width: 36px; text-align: right;
}
input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 28px; background: transparent;
}
input[type=range]::-webkit-slider-runnable-track {
  height: 6px; border-radius: 99px;
  background: linear-gradient(90deg, var(--accent) 0% var(--fill,50%), var(--surface-2) var(--fill,50%) 100%);
  border: 1px solid var(--border);
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 20px; height: 20px; border-radius: 50%;
  background: linear-gradient(180deg, #fff, #f1e0b8);
  border: 1px solid rgba(0,0,0,0.15);
  margin-top: -8px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.4), 0 0 0 4px var(--accent-glow);
}
input[type=range]::-moz-range-track { height: 6px; border-radius: 99px; background: var(--surface-2); border: 1px solid var(--border); }
input[type=range]::-moz-range-progress { height: 6px; border-radius: 99px; background: var(--accent); }
input[type=range]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(180deg,#fff,#f1e0b8); border: 1px solid rgba(0,0,0,0.15); }

.chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 7px 12px;
  border-radius: 99px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-soft);
  font-size: 13px;
  transition: background .2s var(--ease), color .2s var(--ease), border-color .2s var(--ease), transform .15s var(--ease);
}
.chip:hover { background: var(--surface); }
.chip.active {
  background: var(--accent-glow);
  border-color: color-mix(in oklab, var(--accent) 40%, var(--border));
  color: var(--text);
}
.chip:active { transform: scale(0.96); }
.chart-range {
  flex-wrap: nowrap;
  overflow-x: auto;
  padding-bottom: 8px;
  margin: 2px 0 8px;
  scrollbar-width: none;
}
.chart-range::-webkit-scrollbar { display: none; }
.chart-range .chip { white-space: nowrap; }

/* Badge */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px;
  border-radius: 99px;
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.badge.win { background: color-mix(in oklab, var(--green-500) 18%, transparent); color: var(--green-500); }
.badge.lesson { background: color-mix(in oklab, var(--red-500) 18%, transparent); color: var(--red-500); }
.badge.failure { background: color-mix(in oklab, var(--red-500) 18%, transparent); color: var(--red-500); }
.check-grid { display: grid; gap: 8px; }
.check-option {
  display: flex; align-items: center; gap: 10px;
  min-height: 46px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface-2);
}
.check-option input { width: 20px; height: 20px; accent-color: var(--accent); }
.check-option input.input { width: 76px; height: auto; accent-color: var(--accent); }
.list-row[data-journal-id] {
  width: 100%;
  text-align: left;
}
.weight-history .list-row {
  background: linear-gradient(180deg, var(--surface-2), var(--surface));
}
.dropdown-picker {
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--surface-2);
  overflow: hidden;
}
.dropdown-picker summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 50px;
  padding: 0 14px;
  cursor: pointer;
  font-weight: 600;
}
.dropdown-picker summary::-webkit-details-marker { display: none; }
.picker-menu {
  border-top: 1px solid var(--border);
  padding: 12px;
}
.mini-plan {
  display: grid;
  gap: 10px;
}
.plan-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  border-radius: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
}
.plan-item .status-ring {
  width: 28px;
  height: 28px;
  flex: 0 0 28px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: conic-gradient(var(--accent) calc(var(--p) * 1%), var(--surface-2) 0);
}
.plan-item .status-ring::before {
  content: "";
  width: 18px;
  height: 18px;
  border-radius: inherit;
  background: var(--bg-elev);
}

/* ============================================================
   PIN screen
   ============================================================ */
#pin-screen {
  position: fixed; inset: 0;
  z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px;
  background: var(--grad-bg);
  background-attachment: fixed;
  animation: fadeIn .4s var(--ease);
}
#pin-screen.leaving { animation: fadeOut .35s var(--ease) both; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: scale(0.98); } }

.pin-mark {
  width: 64px; height: 64px;
  border-radius: 20px;
  background: linear-gradient(180deg, var(--navy-500), var(--navy-800));
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-lg);
  margin-bottom: 18px;
  position: relative;
}
.pin-mark::after {
  content: "";
  position: absolute; inset: -2px;
  border-radius: inherit;
  background: linear-gradient(135deg, var(--gold-300), transparent 40%, transparent 60%, var(--gold-500));
  z-index: -1;
  filter: blur(10px);
  opacity: 0.4;
}
.pin-mark svg { width: 28px; height: 28px; stroke: var(--gold-300); stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }

#pin-screen h1 { font-size: 24px; margin-bottom: 6px; }
#pin-screen p.lede { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

.pin-dots {
  display: flex; gap: 14px; margin-bottom: 24px;
}
.pin-dots .d {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1.5px solid var(--border-strong);
  background: transparent;
  transition: background .15s var(--ease), transform .15s var(--ease-spring), border-color .2s var(--ease);
}
.pin-dots .d.filled {
  background: var(--accent);
  border-color: var(--accent);
  transform: scale(1.1);
}
.pin-dots.shake { animation: shake .42s var(--ease); }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

.pinpad {
  display: grid;
  grid-template-columns: repeat(3, 72px);
  gap: 14px;
}
.pinpad button {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 500;
  color: var(--text);
  transition: background .15s var(--ease), transform .1s var(--ease), border-color .2s var(--ease);
}
.pinpad button:hover { background: var(--surface); }
.pinpad button:active { transform: scale(0.92); background: var(--accent-glow); border-color: color-mix(in oklab, var(--accent) 40%, var(--border)); }
.pinpad button.del, .pinpad button.ghost { background: transparent; border-color: transparent; color: var(--muted); }
.pinpad button.del:hover, .pinpad button.ghost:hover { background: var(--surface); color: var(--text-soft); }

.pin-hint { color: var(--muted); font-size: 12px; margin-top: 18px; }

/* ============================================================
   Sheet / modal
   ============================================================ */
.scrim {
  position: fixed; inset: 0;
  background: rgba(6,12,26,0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 90;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s var(--ease);
}
.scrim.open { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 95;
  background: var(--bg-elev);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  border-top: 1px solid var(--border);
  padding: 14px 20px calc(28px + var(--safe-bottom));
  max-height: 92dvh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform .42s var(--ease-out);
  box-shadow: 0 -10px 40px rgba(0,0,0,0.25);
}
.sheet.open { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border-strong);
  border-radius: 99px;
  margin: 4px auto 14px;
}
.sheet h2 { margin-bottom: 4px; }
.sheet .lede { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
.sheet-actions {
  display: flex; gap: 8px;
  margin-top: 18px;
}
.sheet-actions .spacer { flex: 1; }

@media (min-width: 600px) {
  .sheet {
    left: 50%; right: auto;
    bottom: 24px;
    transform: translate(-50%, 120%);
    width: min(560px, calc(100vw - 32px));
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
  }
  .sheet.open { transform: translate(-50%, 0); }
}

/* ============================================================
   Jar visuals
   ============================================================ */
.jar-pair {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.jar-wrap {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 14px 20px;
  text-align: center;
  overflow: hidden;
}
.jar-wrap .jar-title {
  font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.jar-svg-wrap {
  position: relative;
  width: min(180px, 42vw); height: min(235px, 55vw);
  margin: 0 auto;
  perspective: 800px;
}
.jar-svg { width: 100%; height: 100%; display: block; }

.jar-cards {
  position: absolute;
  left: 14%; right: 14%;
  bottom: 16%;
  top: 30%;
  pointer-events: none;
  overflow: hidden;
}
.jar-card, .jar-marble {
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,.95), rgba(255,255,255,.12) 23%, transparent 24%),
    radial-gradient(circle at 65% 72%, rgba(0,0,0,.22), transparent 34%),
    linear-gradient(135deg, #eafff1, #4ca873 55%, #1f6b46);
  box-shadow: inset -4px -5px 8px rgba(0,0,0,.22), 0 5px 8px rgba(0,0,0,.18);
  transform-origin: center;
  opacity: 0.95;
}
.jar-card.l, .jar-marble.l {
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,.95), rgba(255,255,255,.12) 23%, transparent 24%),
    radial-gradient(circle at 65% 72%, rgba(0,0,0,.22), transparent 34%),
    linear-gradient(135deg, #ffe8e2, #c75c4f 55%, #80332b);
}
.rack-button {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  width: 100%;
  margin-top: 14px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface-2);
  text-align: left;
}
.rack-icon {
  display: grid;
  grid-template-columns: repeat(4, 16px);
  gap: 4px;
  padding: 8px;
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(184,142,58,.18), var(--surface));
  border: 1px solid var(--border);
}
.rack-jar {
  width: 16px;
  height: 22px;
  border-radius: 5px 5px 8px 8px;
  border: 1px solid var(--jar-stroke);
  background: rgba(255,255,255,.16);
}
.rack-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.rack-card {
  display: grid;
  gap: 6px;
  min-height: 116px;
  padding: 12px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--surface);
}

.jar-lid-piece {
  transform-box: fill-box;
  transform-origin: 12% 80%;
  transition: transform .34s var(--ease-out);
}
.jar-wrap.lid-open .jar-lid-piece { transform: translateY(-7px) rotateX(64deg) rotateZ(-11deg); }

.jar-add-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-top: 14px;
}
.jar-add-w {
  background: linear-gradient(180deg, color-mix(in oklab, var(--green-500) 18%, var(--surface-2)), var(--surface-2));
  border-color: color-mix(in oklab, var(--green-500) 35%, var(--border));
  color: var(--text);
}
.jar-add-l {
  background: linear-gradient(180deg, color-mix(in oklab, var(--red-500) 18%, var(--surface-2)), var(--surface-2));
  border-color: color-mix(in oklab, var(--red-500) 35%, var(--border));
  color: var(--text);
}

/* Folding flashcard animation overlay */
.toss-overlay {
  position: fixed; inset: 0;
  z-index: 110;
  pointer-events: none;
}
.toss-card {
  position: absolute;
  width: 280px;
  background: linear-gradient(180deg, #fffbe9, #f3e3b3);
  color: #1c150a;
  border-radius: 14px;
  padding: 18px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  font-size: 14px;
  line-height: 1.45;
  transform-origin: center;
  will-change: transform, opacity;
  transform-style: preserve-3d;
}
.toss-card.l { background: linear-gradient(180deg, #ffeee8, #f6c8bf); }
.crumple-ball, .flying-marble {
  position: absolute;
  width: 34px;
  height: 34px;
  border-radius: 43% 57% 51% 49%;
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,0.9), transparent 22px),
    linear-gradient(135deg, #fff8df, #d8b96b);
  box-shadow: inset -8px -9px 14px rgba(80,56,15,0.23), 0 18px 40px rgba(0,0,0,0.34);
  will-change: transform, opacity;
}
.crumple-ball.l {
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,0.9), transparent 22px),
    linear-gradient(135deg, #ffe8e1, #d98578);
}
.flying-marble {
  border-radius: 50%;
  background:
    radial-gradient(circle at 28% 22%, rgba(255,255,255,.96), rgba(255,255,255,.18) 24%, transparent 25%),
    radial-gradient(circle at 68% 72%, rgba(0,0,0,.28), transparent 36%),
    linear-gradient(135deg, #eafff1, #4ca873 55%, #1f6b46);
}
.flying-marble.l {
  background:
    radial-gradient(circle at 28% 22%, rgba(255,255,255,.96), rgba(255,255,255,.18) 24%, transparent 25%),
    radial-gradient(circle at 68% 72%, rgba(0,0,0,.28), transparent 36%),
    linear-gradient(135deg, #ffe8e2, #c75c4f 55%, #80332b);
}

/* ============================================================
   Sparkline canvas
   ============================================================ */
canvas.spark { display: block; width: 100%; height: 100%; }

/* ============================================================
   Sync chip
   ============================================================ */
.sync-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 99px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.sync-chip .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--green-500); }
.sync-chip.syncing .pip { background: var(--amber-400); animation: pulse 1.4s var(--ease) infinite; }
.sync-chip.error .pip { background: var(--red-500); }
.sync-chip.local .pip { background: var(--muted); }

/* Toast */
.toast {
  position: fixed;
  left: 50%; bottom: calc(96px + var(--safe-bottom));
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-elev);
  color: var(--text);
  padding: 10px 16px;
  border: 1px solid var(--border-strong);
  border-radius: 12px;
  font-size: 14px;
  box-shadow: var(--shadow);
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s var(--ease), transform .35s var(--ease-out);
  z-index: 200;
  max-width: calc(100vw - 32px);
  text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Meter ring */
.ring {
  --p: 0;
  --size: 64px;
  width: var(--size); height: var(--size);
  border-radius: 50%;
  background:
    conic-gradient(var(--accent) calc(var(--p) * 1%), var(--surface-2) 0);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.ring::before {
  content: "";
  position: absolute; inset: 6px;
  border-radius: 50%;
  background: var(--bg-elev);
}
.ring .ring-val {
  position: relative;
  font-family: var(--font-display);
  font-size: 14px; font-weight: 600;
  font-variant-numeric: tabular-nums;
}

/* Screen transitions */
.tab-view { animation: fadeUp .4s var(--ease-out) both; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Heatmap */
.heatmap {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.heatmap .cell {
  aspect-ratio: 1;
  border-radius: 5px;
  background: var(--surface-2);
  border: 1px solid var(--border);
}
.heatmap .cell[data-l="1"] { background: color-mix(in oklab, var(--accent) 25%, var(--surface-2)); }
.heatmap .cell[data-l="2"] { background: color-mix(in oklab, var(--accent) 50%, var(--surface-2)); }
.heatmap .cell[data-l="3"] { background: color-mix(in oklab, var(--accent) 75%, var(--surface-2)); }
.heatmap .cell[data-l="4"] { background: var(--accent); }

/* Advice card */
.advice-card {
  position: relative;
  padding: 22px;
  border-radius: var(--radius-lg);
  background:
    radial-gradient(400px 200px at 100% 0%, var(--accent-glow), transparent 60%),
    linear-gradient(180deg, var(--surface-2), var(--surface));
  border: 1px solid color-mix(in oklab, var(--accent) 25%, var(--border));
  overflow: hidden;
}
.advice-card::after {
  content: "";
  position: absolute; right: -30px; top: -30px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  pointer-events: none;
}
.advice-card .label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.advice-card .quote {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 500;
  line-height: 1.45;
  letter-spacing: -0.01em;
}
.advice-card .pillar-tag {
  display: inline-block;
  margin-top: 10px;
  font-size: 12px; color: var(--muted);
}
.advice-card .reshuffle {
  position: absolute;
  top: 14px; right: 14px;
}

/* Detail row */
.kv {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  gap: 14px;
}
.kv:last-child { border-bottom: none; }
.kv .k { color: var(--muted); font-size: 13px; }
.kv .v { font-size: 14px; text-align: right; }

/* Greeting */
.greeting {
  margin-bottom: 6px;
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.greeting .accent { color: var(--accent); }
.subgreeting { color: var(--muted); font-size: 14px; margin-bottom: 16px; }

/* Utility */
.row-between { display: flex; justify-content: space-between; align-items: center; }
.gap-sm { gap: 8px; }
.flex-1 { flex: 1; min-width: 0; }
.text-right { text-align: right; }
.mt-sm { margin-top: 8px; }
.mt-md { margin-top: 14px; }
.mt-lg { margin-top: 22px; }
.mb-sm { margin-bottom: 8px; }
.mb-md { margin-bottom: 14px; }

/* Responsive tweaks */
@media (min-width: 600px) {
  .quick-grid { grid-template-columns: repeat(3, 1fr); }
  .pillar-grid { grid-template-columns: repeat(3, 1fr); }
}
/* ============================================================
   v2 — Hero, rings, composer, training balance, 3D marbles
   ============================================================ */

/* ---- Hero anchor card ---- */
.hero-anchor {
  position: relative;
  margin: 4px 0 18px;
  padding: 26px 22px 24px;
  border-radius: var(--radius-lg);
  background:
    radial-gradient(700px 220px at 90% -20%, var(--accent-glow), transparent 65%),
    linear-gradient(160deg, var(--surface-2), var(--surface));
  border: 1px solid var(--border);
  overflow: hidden;
  isolation: isolate;
}
.hero-anchor::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  background: linear-gradient(135deg, color-mix(in oklab, var(--accent) 30%, transparent), transparent 35%, transparent 65%, color-mix(in oklab, var(--navy-300) 25%, transparent));
  opacity: .55;
  z-index: -1;
  pointer-events: none;
}
.hero-anchor .eyebrow {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  font-weight: 500;
}
.hero-anchor h1 {
  font-size: clamp(26px, 5.4vw, 32px);
  line-height: 1.1;
  margin-bottom: 4px;
}
.hero-anchor .date {
  color: var(--muted);
  font-size: 13px;
  letter-spacing: 0.02em;
}
.hero-anchor .anchor-quote {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-family: var(--font-display);
  font-size: 16px;
  line-height: 1.5;
  font-weight: 500;
  letter-spacing: -0.005em;
  color: var(--text-soft);
}
.hero-anchor .anchor-meta {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.hero-anchor .reshuffle-hero {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 4px 10px;
  border-radius: 99px;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: background .2s var(--ease), color .2s var(--ease), border-color .2s var(--ease);
}
.hero-anchor .reshuffle-hero:hover { background: var(--surface-2); color: var(--text-soft); border-color: var(--border-strong); }
.hero-anchor .reshuffle-hero svg { width: 11px; height: 11px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }

/* ---- Body Snapshot: metric-specific visualizations ---- */
.body-snapshot {
  margin-bottom: 14px;
  padding: 20px;
  background:
    radial-gradient(520px 220px at 100% -20%, rgba(184,142,58,0.10), transparent 68%),
    linear-gradient(160deg, var(--surface-2), var(--surface));
}
.body-snapshot-head {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 18px;
}
.body-snapshot-head h3 {
  font-size: 19px;
  letter-spacing: -0.01em;
}
.body-snapshot-head .sub {
  color: var(--muted);
  font-size: 13px;
  margin-top: 2px;
}
.body-snapshot-grid {
  display: grid;
  gap: 16px;
}
.body-metric {
  padding: 14px;
  border-radius: 18px;
  background: color-mix(in oklab, var(--surface-2) 72%, transparent);
  border: 1px solid var(--border);
}
.metric-top {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}
.metric-kicker {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 650;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.metric-kicker::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 99px;
  background: var(--metric-color);
  box-shadow: 0 0 14px color-mix(in oklab, var(--metric-color) 45%, transparent);
}
.metric-value {
  margin-top: 3px;
  font-family: var(--font-display);
  font-size: clamp(21px, 5vw, 30px);
  font-weight: 650;
  letter-spacing: -0.015em;
  font-variant-numeric: tabular-nums;
}
.metric-value .unit {
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
}
.metric-note {
  color: var(--muted);
  font-size: 12px;
  margin-top: 2px;
}
.status-pill {
  flex: 0 0 auto;
  padding: 5px 10px;
  border-radius: 999px;
  border: 1px solid color-mix(in oklab, var(--metric-color) 32%, var(--border));
  background: color-mix(in oklab, var(--metric-color) 10%, transparent);
  color: var(--text-soft);
  font-size: 11px;
  font-weight: 650;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.target-band {
  position: relative;
  height: 16px;
  overflow: hidden;
  border-radius: 999px;
  background:
    linear-gradient(90deg,
      color-mix(in oklab, var(--metric-color) 10%, var(--surface-2)) 0%,
      color-mix(in oklab, var(--metric-color) 10%, var(--surface-2)) 72%,
      color-mix(in oklab, var(--metric-color) 28%, var(--surface-2)) 72%,
      color-mix(in oklab, var(--metric-color) 28%, var(--surface-2)) 88%,
      color-mix(in oklab, var(--red-500) 11%, var(--surface-2)) 88%,
      color-mix(in oklab, var(--red-500) 11%, var(--surface-2)) 100%);
  border: 1px solid var(--border);
}
.target-band::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 72%, rgba(255,255,255,0.20) 72%, rgba(255,255,255,0.20) 88%, transparent 88%);
  pointer-events: none;
}
.snapshot-fill {
  position: absolute;
  inset: 0 auto 0 0;
  width: calc(var(--pct, 0) * 1%);
  max-width: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, color-mix(in oklab, var(--metric-color) 55%, white), var(--metric-color));
  box-shadow: 0 0 18px color-mix(in oklab, var(--metric-color) 24%, transparent);
  transform-origin: left center;
  animation: growBar .82s var(--ease-out) both;
}
.goal-bar {
  position: relative;
  height: 14px;
  overflow: hidden;
  border-radius: 999px;
  background: color-mix(in oklab, var(--metric-color) 10%, var(--surface-2));
  border: 1px solid var(--border);
}
.week-strip {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 6px;
}
.week-day {
  min-height: 48px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  display: grid;
  place-items: center;
  gap: 1px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 650;
  animation: riseSoft .42s var(--ease-out) both;
  animation-delay: calc(var(--i, 0) * 38ms);
}
.week-day .day-min {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
}
.week-day.done {
  color: var(--text);
  background: linear-gradient(180deg, color-mix(in oklab, var(--navy-300) 22%, var(--surface-2)), var(--surface-2));
  border-color: color-mix(in oklab, var(--navy-300) 42%, var(--border));
}
.week-day.today {
  outline: 2px solid color-mix(in oklab, var(--navy-300) 56%, transparent);
  box-shadow: 0 0 0 4px color-mix(in oklab, var(--navy-300) 12%, transparent);
}
.snapshot-insight {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  color: var(--text-soft);
  font-size: 14px;
  line-height: 1.45;
}
@keyframes growBar {
  from { transform: scaleX(0); opacity: .65; }
  to { transform: scaleX(1); opacity: 1; }
}
@keyframes riseSoft {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}
@media (min-width: 720px) {
  .body-snapshot-grid { grid-template-columns: 1fr 1fr; }
  .body-metric.motion { grid-column: 1 / -1; }
}

/* ---- Quick add: horizontal rail ---- */
.quick-grid.q4 {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 2px 2px 10px;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
}
.quick-grid.q4 .quick-btn {
  flex: 0 0 92px;
  min-height: 86px;
  scroll-snap-align: start;
}
.quick-btn.more-btn {
  background: linear-gradient(180deg, var(--surface), var(--surface-2));
  border-style: dashed;
}
.quick-btn.more-btn svg { stroke: var(--text-soft); }

/* ---- Inline reflection composer ---- */
.composer {
  position: relative;
  margin-top: 14px;
  padding: 18px;
  border-radius: var(--radius-lg);
  background:
    radial-gradient(420px 180px at 0% 0%, color-mix(in oklab, var(--accent) 12%, transparent), transparent 65%),
    linear-gradient(160deg, var(--surface-2), var(--surface));
  border: 1px solid var(--border);
  overflow: hidden;
}
.composer .label-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.composer .prompt-eyebrow {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}
.composer .prompt-pillar {
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--accent);
}
.composer h3 {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 12px;
  color: var(--text);
}
.composer .composer-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.5;
  resize: none;
  min-height: 48px;
  padding: 0;
}
.composer .composer-input::placeholder { color: var(--muted); }
.composer .composer-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.composer .composer-types {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.composer .composer-type {
  padding: 4px 10px;
  font-size: 11px;
  letter-spacing: 0.04em;
  border-radius: 99px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: background .2s var(--ease), color .2s var(--ease), border-color .2s var(--ease);
}
.composer .composer-type:hover { background: var(--surface); color: var(--text-soft); }
.composer .composer-type.active {
  background: var(--accent-glow);
  border-color: color-mix(in oklab, var(--accent) 40%, var(--border));
  color: var(--text);
}
.composer .composer-save {
  padding: 8px 16px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  background: linear-gradient(180deg, var(--gold-300), var(--gold-500));
  color: #1c150a;
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: 0 1px 0 rgba(255,255,255,0.30) inset;
  opacity: 0.5;
  pointer-events: none;
  transition: opacity .25s var(--ease), transform .15s var(--ease);
}
.composer.has-text .composer-save {
  opacity: 1;
  pointer-events: auto;
}
.composer .composer-save:active { transform: scale(0.97); }

/* ---- Memory card (slim) ---- */
.memory-card {
  margin-top: 14px;
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background .2s var(--ease), border-color .2s var(--ease), transform .15s var(--ease);
}
.memory-card:hover { background: var(--surface-2); }
.memory-card:active { transform: scale(0.99); }
.memory-card .memory-mark {
  flex-shrink: 0;
  width: 36px; height: 36px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(180deg, var(--accent-glow), transparent);
  border: 1px solid color-mix(in oklab, var(--accent) 30%, var(--border));
}
.memory-card .memory-mark svg { width: 16px; height: 16px; stroke: var(--accent); stroke-width: 1.7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.memory-card.l .memory-mark { background: linear-gradient(180deg, color-mix(in oklab, var(--red-500) 14%, transparent), transparent); border-color: color-mix(in oklab, var(--red-500) 35%, var(--border)); }
.memory-card.l .memory-mark svg { stroke: var(--red-500); }
.memory-card .memory-body { flex: 1; min-width: 0; }
.memory-card .memory-title { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.memory-card .memory-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ---- Pillars: more compact + horizontal scroll ---- */
.pillars-ring-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.pillar-ring-card {
  padding: 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: linear-gradient(150deg, var(--surface-2), var(--surface));
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.pillar-ring-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
}
.pillar-ring-head .name { font-size: 13px; font-weight: 600; }
.pillar-ring-head .score { font-size: 12px; color: var(--muted); }
.pillar-ring-viz {
  width: 92px;
  height: 92px;
  border-radius: 50%;
  margin: 2px auto 0;
  position: relative;
  background:
    conic-gradient(var(--ring-color, var(--accent)) calc(var(--ring-pct, 0) * 1%), color-mix(in oklab, var(--border) 72%, transparent) 0);
}
.pillar-ring-viz::before {
  content: "";
  position: absolute;
  inset: 11px;
  border-radius: 50%;
  background: var(--bg-elev);
  border: 1px solid var(--border);
}
.pillar-ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  z-index: 1;
}
.pillar-ring-center.positive { color: var(--green-500); }
.pillar-ring-center.neutral { color: var(--muted); }
.pillar-ring-center.negative { color: var(--red-500); }
.pillar-ring-meta {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
}

.workspaces-section {
  margin-top: 14px;
}
.workspace-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 2px 2px 6px;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
}
.workspace-card {
  flex: 0 0 min(40vw, 180px);
  min-height: 120px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: linear-gradient(160deg, var(--surface-2), var(--surface));
  padding: 14px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: left;
  scroll-snap-align: start;
}
.workspace-card .icon-wrap {
  width: 36px;
  height: 36px;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-glow);
  color: var(--accent);
}
.workspace-card .icon-wrap svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  stroke-width: 1.7;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.workspace-card .label { font-size: 14px; font-weight: 600; color: var(--text); }
.workspace-card .meta { font-size: 12px; color: var(--muted); }
.workspace-page {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.workspace-back {
  align-self: flex-start;
  padding: 8px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  font-size: 13px;
  color: var(--text-soft);
}
.workspace-placeholder {
  padding: 18px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
}
.books-shell { display: grid; gap: 14px; }
.books-toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.books-toolbar select, .books-toolbar input {
  min-height: 38px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  padding: 0 10px;
}
.books-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 12px;
}
.book-card {
  border: 1px solid var(--border);
  border-radius: 18px;
  background: linear-gradient(160deg, var(--surface-2), var(--surface));
  padding: 12px;
  display: grid;
  gap: 10px;
}
.book-cover {
  height: 118px;
  border-radius: 14px;
  border: 1px dashed color-mix(in oklab, var(--accent) 40%, var(--border));
  background: linear-gradient(135deg, var(--accent-glow), transparent);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.book-meta-title { font-weight: 700; font-size: 15px; }
.book-meta-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.book-labels { display: flex; flex-wrap: wrap; gap: 6px; }
.book-label-chip {
  border-radius: 999px;
  padding: 4px 8px;
  font-size: 11px;
  border: 1px solid var(--border);
  background: var(--surface);
}
.book-detail {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 14px;
  display: grid;
  gap: 12px;
}
.book-doc {
  border: 1px solid var(--border);
  border-radius: 12px;
  min-height: 220px;
  padding: 12px;
  background: var(--surface-2);
  white-space: pre-wrap;
}
.book-doc .doc-line-heading {
  font-weight: 700;
  font-size: 1.06rem;
  margin: 8px 0 4px;
}
.book-doc .doc-line-text {
  font-size: .95rem;
  line-height: 1.45;
}
@media (min-width: 768px) {
  .workspace-card { flex-basis: calc((100% - 30px) / 4); max-width: calc((100% - 30px) / 4); }
}

/* ---- Workout v2: weekly strip + balance bars ---- */
.weekly-strip {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin: 12px 0 4px;
}
.weekly-strip .day {
  position: relative;
  aspect-ratio: 1;
  border-radius: 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1px;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: background .25s var(--ease), border-color .25s var(--ease);
}
.weekly-strip .day .dnum {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-soft);
}
.weekly-strip .day.today {
  border-color: color-mix(in oklab, var(--accent) 50%, var(--border));
  background: var(--accent-glow);
}
.weekly-strip .day.today .dnum { color: var(--accent); }
.weekly-strip .day.trained {
  background:
    radial-gradient(circle at 40% 30%, color-mix(in oklab, var(--accent) 28%, var(--surface-2)), var(--surface-2));
  border-color: color-mix(in oklab, var(--accent) 35%, var(--border));
}
.weekly-strip .day.trained .dnum { color: var(--text); }
.weekly-strip .day.trained::after {
  content: "";
  position: absolute;
  bottom: 6px;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent-glow);
}

.balance-list { display: grid; gap: 10px; }
.balance-row {
  display: grid;
  grid-template-columns: 92px 1fr 32px;
  gap: 10px;
  align-items: center;
  font-size: 13px;
}
.balance-row .bname { color: var(--text-soft); }
.balance-row .btrack {
  height: 8px;
  border-radius: 99px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
}
.balance-row .bfill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--gold-300), var(--gold-500));
  transition: width 1s var(--ease-out);
}
.balance-row.cold .bfill { background: linear-gradient(90deg, color-mix(in oklab, var(--navy-300) 60%, transparent), var(--navy-300)); opacity: 0.7; }
.balance-row .bcount {
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  font-size: 12px;
}

.duration-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.duration-chips .dchip {
  flex: 1;
  min-width: 56px;
  padding: 9px 8px;
  border-radius: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-soft);
  font-size: 13px;
  font-variant-numeric: tabular-nums;
  text-align: center;
  transition: background .2s var(--ease), color .2s var(--ease), border-color .2s var(--ease);
}
.duration-chips .dchip.active {
  background: var(--accent-glow);
  border-color: color-mix(in oklab, var(--accent) 40%, var(--border));
  color: var(--text);
}

/* ---- 3D marble jar drop animation ---- */
.marble-3d {
  position: absolute;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  pointer-events: none;
  transform-style: preserve-3d;
  /* Tri-layer marble: glass body, deep core, specular highlight */
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,0.95), rgba(255,255,255,0.20) 18%, transparent 28%),
    radial-gradient(circle at 70% 78%, rgba(0,0,0,0.45), transparent 42%),
    radial-gradient(circle at 50% 55%, color-mix(in oklab, var(--green-500) 55%, white), color-mix(in oklab, var(--green-500) 75%, black) 75%);
  box-shadow:
    inset -6px -8px 14px rgba(0,0,0,0.30),
    inset 4px 4px 8px rgba(255,255,255,0.20),
    0 8px 18px rgba(0,0,0,0.35),
    0 0 22px rgba(90,154,110,0.30);
  will-change: transform, opacity, left, top;
}
.marble-3d.l {
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,0.95), rgba(255,255,255,0.20) 18%, transparent 28%),
    radial-gradient(circle at 70% 78%, rgba(0,0,0,0.45), transparent 42%),
    radial-gradient(circle at 50% 55%, color-mix(in oklab, var(--red-500) 55%, white), color-mix(in oklab, var(--red-500) 75%, black) 75%);
  box-shadow:
    inset -6px -8px 14px rgba(0,0,0,0.30),
    inset 4px 4px 8px rgba(255,255,255,0.20),
    0 8px 18px rgba(0,0,0,0.35),
    0 0 22px rgba(200,88,74,0.30);
}
/* Specular sheen that rotates with the marble for a "spinning glass" feel */
.marble-3d::before {
  content: "";
  position: absolute;
  inset: 6%;
  border-radius: 50%;
  background:
    radial-gradient(ellipse at 25% 22%, rgba(255,255,255,0.65), rgba(255,255,255,0) 40%);
  pointer-events: none;
  mix-blend-mode: screen;
}

/* When a marble settles inside the jar, fade it in gracefully */
.jar-marble.settling {
  animation: settleIn .35s var(--ease-spring) both;
}
@keyframes settleIn {
  from { transform: var(--rest, rotate(0)) scale(0.4); opacity: 0; }
  to { opacity: .95; }
}
.jar-marble.bump {
  animation: bumpRipple .35s var(--ease-out) both;
}
@keyframes bumpRipple {
  0% { transform: var(--rest, rotate(0)) translateY(0); }
  40% { transform: var(--rest, rotate(0)) translateY(-3px); }
  100% { transform: var(--rest, rotate(0)) translateY(0); }
}

/* Improved jar lid open animation — opens forward and tilts */
.jar-svg-wrap { perspective: 1000px; transform-style: preserve-3d; }
.jar-wrap.lid-open .jar-lid-piece {

/* ----------------------------------------------------------
   Storage helpers
   ---------------------------------------------------------- */
function loadJSON(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}
function persistCache() { saveJSON(KEYS.cache, state.data); }
function persistOutbox() { saveJSON(KEYS.outbox, state.outbox); }
function persistSettings() { saveJSON(KEYS.settings, state.settings); }
function persistNoteSources() { saveJSON(KEYS.noteSources, state.notes.sources); }
function persistNoteSessions() { saveJSON(KEYS.noteSessions, state.notes.sessions); }


function blankWorkspaceStore() {
  const seeded = {
    version: WORKSPACE_MODEL_VERSION,
    metadata: {
      schema_version: WORKSPACE_MODEL_VERSION,
      created_at: nowISO(),
      updated_at: nowISO(),
      migrated_from_legacy_at: null
    },
    legacy: {
      journal_entry_ids: []
    }
  };
  WORKSPACE_ENTITY_BUCKETS.forEach(bucket => seeded[bucket] = []);
  return seeded;
}

function ensureWorkspaceStoreShape(store) {
  const next = store && typeof store === "object" ? store : {};
  next.version = Number(next.version) || WORKSPACE_MODEL_VERSION;
  next.metadata = next.metadata || {};
  next.metadata.schema_version = WORKSPACE_MODEL_VERSION;
  if (!next.metadata.created_at) next.metadata.created_at = nowISO();
  next.metadata.updated_at = nowISO();
  if (!next.metadata.migrated_from_legacy_at) next.metadata.migrated_from_legacy_at = null;
  next.legacy = next.legacy || { journal_entry_ids: [] };
  if (!Array.isArray(next.legacy.journal_entry_ids)) next.legacy.journal_entry_ids = [];
  WORKSPACE_ENTITY_BUCKETS.forEach(bucket => {
    if (!Array.isArray(next[bucket])) next[bucket] = [];
  });
  return next;
}

function loadWorkspaceStore() {
  const stored = loadJSON(KEYS.workspaceData, null);
  return ensureWorkspaceStoreShape(stored || blankWorkspaceStore());
}

function persistWorkspaceStore() {
  if (!state.workspaceStore) state.workspaceStore = loadWorkspaceStore();
  state.workspaceStore.metadata.updated_at = nowISO();
  saveJSON(KEYS.workspaceData, state.workspaceStore);
  saveJSON(KEYS.workspaceMeta, state.workspaceStore.metadata);
}

function workspaceCollection(name) {
  if (!state.workspaceStore) state.workspaceStore = loadWorkspaceStore();
  return state.workspaceStore[name] || [];
}

function createWorkspaceEntity(name, entity) {
  const list = workspaceCollection(name);
  const row = Object.assign({ id: uid(), created_at: nowISO(), updated_at: nowISO() }, entity || {});
  list.unshift(row);
  state.workspaceStore[name] = list;
  persistWorkspaceStore();
  markWorkspaceEntityForSync(name, row.id, "create");
  return row;
}

function readWorkspaceEntities(name, filterFn = null) {
  const list = workspaceCollection(name).slice();
  return filterFn ? list.filter(filterFn) : list;
}

function updateWorkspaceEntity(name, id, patch) {
  const list = workspaceCollection(name);
  const target = list.find(x => x.id === id);
  if (!target) return null;
  Object.assign(target, patch || {}, { updated_at: nowISO() });
  persistWorkspaceStore();
  markWorkspaceEntityForSync(name, id, "update");
  return target;
}

function appendWorkspaceNote(workspaceId, text, opts = {}) {
  const block = createWorkspaceEntity("cleaned_note_blocks", {
    workspace_id: workspaceId,
    session_id: opts.session_id || null,
    source_id: opts.source_id || null,
    content: text || "",
    format: opts.format || "plain_text",
    tags: Array.isArray(opts.tags) ? opts.tags : [],
    created_by: opts.created_by || "local"
  });
  return block;
}

function createWorkspaceTag(label, workspaceId = null) {
  return createWorkspaceEntity("tags", {
    workspace_id: workspaceId,
    label: label || "",
    normalized: String(label || "").trim().toLowerCase()
  });
}

function createAttachmentMetadata(payload = {}) {
  return createWorkspaceEntity("attachments", {
    workspace_id: payload.workspace_id || null,
    session_id: payload.session_id || null,
    source_id: payload.source_id || null,
    filename: payload.filename || "",
    mime_type: payload.mime_type || "",
    byte_size: Number(payload.byte_size) || 0,
    local_ref: payload.local_ref || null
  });
}

function buildWorkspaceSyncPayload() {
  return {
    version: state.workspaceStore?.version || WORKSPACE_MODEL_VERSION,
    metadata: state.workspaceStore?.metadata || {},
    entities: Object.fromEntries(WORKSPACE_ENTITY_BUCKETS.map(k => [k, workspaceCollection(k)]))
  };
}

function queueWorkspaceSyncJob(reason = "manual") {
  // Reserved for future backend sync integration.
  return { queued: false, reason, at: nowISO() };
}

function markWorkspaceEntityForSync(entity, id, action) {
  // Reserved for future backend sync integration.
  return { entity, id, action, at: nowISO() };
}

function migrateLegacyJournalToWorkspaceStore() {
  const journalRows = state.data.Journal_Entries || [];
  if (!journalRows.length) return;
  const legacyIds = new Set(state.workspaceStore.legacy.journal_entry_ids || []);
  const reflectionWorkspace = ensureWorkspaceForKind("reflection");
  let changed = false;
  journalRows.forEach(entry => {
    if (!entry?.id || legacyIds.has(entry.id)) return;
    legacyIds.add(entry.id);
    createWorkspaceEntity("cleaned_note_blocks", {
      workspace_id: reflectionWorkspace.id,
      legacy_journal_id: entry.id,
      source: "legacy_journal",
      date: entry.date || todayISO(),
      content: entry.entry_text || "",
      title: entry.title || entry.journal_type || "Legacy reflection",
      tags: (entry.tags || "").split(",").map(x => x.trim()).filter(Boolean),
      format: "plain_text",
      created_by: "legacy_migration"
    });
    changed = true;
  });
  if (changed) {
    state.workspaceStore.legacy.journal_entry_ids = [...legacyIds];
    state.workspaceStore.metadata.migrated_from_legacy_at = state.workspaceStore.metadata.migrated_from_legacy_at || nowISO();
    persistWorkspaceStore();
  }
}

function ensureWorkspaceForKind(kind) {
  const existing = workspaceCollection("workspaces").find(w => w.type === kind);
  if (existing) return existing;
  return createWorkspaceEntity("workspaces", {
    type: kind,
    name: WORKSPACE_KIND_LABELS[kind] || "Workspace",
    folder_id: null,
    status: "active",
    labels: [],
    payload: (WORKSPACE_TYPE_FIELDS[kind] ? WORKSPACE_TYPE_FIELDS[kind]() : {})
  });
}

/* ----------------------------------------------------------
   IDs, dates
   ---------------------------------------------------------- */
function uid() {
  return "e_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
}
function nowISO() { return new Date().toISOString(); }
function todayISO() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.toISOString().slice(0,10);
}
function isSameDay(a, b) { return (a||"").slice(0,10) === (b||"").slice(0,10); }
function daysAgoISO(n) {
  const d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0,10);
}
function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso.length <= 10 ? iso + "T00:00:00" : iso);
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}
function fmtRelDay(iso) {
  const today = todayISO();
  const yest = daysAgoISO(1);
  if (isSameDay(iso, today)) return "Today";
  if (isSameDay(iso, yest)) return "Yesterday";
  return fmtDate(iso);
}

   PIN
   ---------------------------------------------------------- */
const pinScreen = document.getElementById("pin-screen");
const pinDots = document.getElementById("pin-dots");
const pinPad = document.getElementById("pinpad");
const pinTitle = document.getElementById("pin-title");
const pinLede = document.getElementById("pin-lede");
const pinHint = document.getElementById("pin-hint");

let pinBuffer = "";
let pinMode = "enter"; // enter | set | confirm
let pinStashed = "";

function startPin() {
  const stored = localStorage.getItem(KEYS.pin);
  if (!stored) {
    pinMode = "set";
    pinTitle.textContent = "Set a PIN";
    pinLede.textContent = "Choose any 4 digits";
    pinHint.textContent = "You'll use this each time you open the app.";
  } else {
    pinMode = "enter";
    pinTitle.textContent = "Welcome back";
    pinLede.textContent = "Enter your PIN";
    pinHint.textContent = "";
  }
  renderPinDots();
}

function renderPinDots() {
  [...pinDots.children].forEach((d, i) => d.classList.toggle("filled", i < pinBuffer.length));
}

pinPad.addEventListener("click", e => {
  const btn = e.target.closest("button");
  if (!btn) return;
  const k = btn.dataset.k;
  if (k === "del") {
    pinBuffer = pinBuffer.slice(0, -1);
    renderPinDots();
    return;
  }
  if (k === "reset") {
    if (confirm("Reset PIN? This clears the saved PIN on this device only. Your data is unaffected.")) {
      localStorage.removeItem(KEYS.pin);
      pinBuffer = "";
      startPin();
    }
    return;
  }
  if (pinBuffer.length >= 4) return;
  pinBuffer += k;
  renderPinDots();
  if (pinBuffer.length === 4) setTimeout(handlePinComplete, 120);
});

document.addEventListener("keydown", e => {
  if (pinScreen.classList.contains("leaving") || pinScreen.style.display === "none") return;
  if (state.unlocked) return;
  if (e.key >= "0" && e.key <= "9" && pinBuffer.length < 4) {
    pinBuffer += e.key;
    renderPinDots();
    if (pinBuffer.length === 4) setTimeout(handlePinComplete, 120);
  } else if (e.key === "Backspace") {
    pinBuffer = pinBuffer.slice(0, -1);
    renderPinDots();
  }
});

function handlePinComplete() {
  if (pinMode === "set") {
    pinStashed = pinBuffer;
    pinBuffer = "";
    pinMode = "confirm";
    pinTitle.textContent = "Confirm PIN";
    pinLede.textContent = "Enter the same 4 digits again";
    renderPinDots();
    return;
  }
  if (pinMode === "confirm") {
    if (pinBuffer === pinStashed) {
      localStorage.setItem(KEYS.pin, pinStashed);
      unlock();
    } else {
      pinBuffer = ""; pinStashed = "";
      pinMode = "set";
      pinTitle.textContent = "Set a PIN";
      pinLede.textContent = "Didn't match. Try again.";
      shakeDots();
      renderPinDots();
    }
    return;
  }
  // enter
  const stored = localStorage.getItem(KEYS.pin);
  if (pinBuffer === stored) {
    unlock();
  } else {
    pinBuffer = "";
    shakeDots();
    pinLede.textContent = "Incorrect. Try again.";
    renderPinDots();
  }
}

function shakeDots() {
  pinDots.classList.add("shake");
  setTimeout(() => pinDots.classList.remove("shake"), 450);
}

function unlock() {
  state.unlocked = true;
  pinScreen.classList.add("leaving");
  setTimeout(() => {
    pinScreen.style.display = "none";
    document.getElementById("app").classList.remove("hidden");
    bootApp();
  }, 320);
}

/* ----------------------------------------------------------
   Sync
   ---------------------------------------------------------- */
const syncChip = document.getElementById("sync-chip");
const syncLabel = document.getElementById("sync-label");

function setSync(status, label) {
  syncChip.classList.remove("syncing", "error", "local");
  if (status === "syncing") syncChip.classList.add("syncing");
  else if (status === "error") syncChip.classList.add("error");
  else if (status === "local") syncChip.classList.add("local");
  syncLabel.textContent = label || ({ idle: "Synced", syncing: "Syncing", error: "Retry", local: "Local only" })[status];
  state.syncStatus = status;
}

function isCloudConfigured() {
  return GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL.startsWith("https://script.google.com");
}

async function cloudFetch(payload) {
  if (!isCloudConfigured()) throw new Error("Cloud not configured");
  // Use no-cors POST, response is opaque, but our outbox guarantees no data loss.
  // For getData we try fetch first, then JSONP for Apps Script CORS edge cases.
  if (payload.action === "getData") {
    const url = GOOGLE_SCRIPT_URL + "?action=getData&device=" + encodeURIComponent(DEVICE_ID);
    try {
      const res = await fetch(url, { method: "GET" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    } catch (err) {
      return await jsonp(url);
    }
  }
  await fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
  return { ok: true, opaque: true };
}

function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = "__lh_jsonp_" + Math.random().toString(36).slice(2);
    const script = document.createElement("script");
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error("JSONP timeout"));
    }, 12000);
    function cleanup() {
      clearTimeout(timer);
      delete window[cb];
      script.remove();
    }
    window[cb] = data => {
      cleanup();
      resolve(data);
    };
    script.onerror = () => {
      cleanup();
      reject(new Error("JSONP load failed"));
    };
    script.src = url + "&callback=" + encodeURIComponent(cb);
    document.head.appendChild(script);
  });
}

async function loadFromCloud() {
  if (!isCloudConfigured()) {
    setSync("local");
    return;
  }
  setSync("syncing", "Loading");
  try {
    const res = await cloudFetch({ action: "getData" });
    if (res && res.tables) {
      TABLES.forEach(t => {
        if (Array.isArray(res.tables[t])) state.data[t] = res.tables[t];
      });
      hydrateSettingsFromRows();
      persistCache();
    }
    setSync("idle", "Synced");
  } catch (e) {
    console.warn("Cloud load failed:", e);
    setSync("error", "Offline");
  }
}

function hydrateSettingsFromRows() {
  const weekly = (state.data.Settings || []).find(x => x.key === "weekly_plan");
  if (weekly && weekly.value) {
    try {
      state.settings.weeklyPlan = { ...defaultWeeklyPlan(), ...JSON.parse(weekly.value) };
      persistSettings();
    } catch {}
  }
}

function enqueue(action, table, row) {
  state.outbox.push({ id: uid(), action, table, row, ts: nowISO() });
  persistOutbox();
  flushOutbox();
}

let flushing = false;
async function flushOutbox() {
  if (flushing) return;
  if (!isCloudConfigured()) { setSync("local"); return; }
  if (!state.outbox.length) { if (state.syncStatus !== "error") setSync("idle"); return; }
  flushing = true;
  setSync("syncing");
  while (state.outbox.length) {
    const job = state.outbox[0];
    try {
      await cloudFetch({ action: job.action, table: job.table, row: job.row });
      state.outbox.shift();
      persistOutbox();
      // mark row as saved in local cache
      if (job.row && job.row.id) {
        markRowSaved(job.table, job.row.id);
      }
    } catch (e) {
      console.warn("Sync error:", e);
      setSync("error");
      flushing = false;
      return;
    }
  }
  flushing = false;
  setSync("idle");
  if (!state.pendingToss) {
    renderActive(); // refresh sync states
  }
}

function markRowSaved(table, id) {
  const list = state.data[table] || [];
  const r = list.find(x => x.id === id);
  if (r) { r.sync_status = "saved"; persistCache(); }
}

window.addEventListener("online",  () => { state.online = true;  flushOutbox(); });
window.addEventListener("offline", () => { state.online = false; setSync("error", "Offline"); });

/* ----------------------------------------------------------
   Insert (optimistic)
   ---------------------------------------------------------- */
function insertRow(table, partial) {
  const row = {
    id: uid(),
    created_at: nowISO(),
    updated_at: nowISO(),
    date: partial.date || todayISO(),
    device_source: DEVICE_ID,
    sync_status: isCloudConfigured() ? "syncing" : "local",
    ...partial
  };
  state.data[table] = state.data[table] || [];
  state.data[table].push(row);
  persistCache();
  enqueue("addEntry", table, row);
  return row;
}
function updateRow(table, id, patch) {
  const list = state.data[table] || [];
  const r = list.find(x => x.id === id);
  if (!r) return;
  Object.assign(r, patch, { updated_at: nowISO(), sync_status: isCloudConfigured() ? "syncing" : "local" });
  persistCache();
  enqueue("updateEntry", table, r);
}
function deleteRow(table, id) {
  const list = state.data[table] || [];
  const idx = list.findIndex(x => x.id === id);
  if (idx === -1) return;
  const [row] = list.splice(idx, 1);
  persistCache();
  enqueue("deleteEntry", table, { id });
  return row;
}

const NOTE_SOURCE_TYPES = ["Book", "Class", "Project", "Personal", "Meeting", "Article"];
const INK_COLORS = [
  { key: "black", label: "Black", value: "#161616" },
  { key: "navy", label: "Navy", value: "#1b325f" },
  { key: "green", label: "Dark Green", value: "#1d5b44" },
  { key: "burgundy", label: "Burgundy", value: "#5f1f2e" }
];
const PEN_SIZES = [
  { key: "fine", label: "Fine", px: 1.8 },
  { key: "medium", label: "Med", px: 2.8 },
  { key: "bold", label: "Bold", px: 4.0 }
];
const NOTE_CHUNK_HEIGHT = 620;
const NOTE_DRAFT_LIMIT = 220;
const NOTE_SIDE_GUTTER = 0;
const noteUI = {
  el: document.getElementById("note-screen"),
  stack: document.getElementById("note-canvas-stack"),
  wrap: document.getElementById("note-canvas-wrap"),
  source: document.getElementById("note-source-label"),
  colorGroup: document.getElementById("ink-color-group"),
  thicknessGroup: document.getElementById("ink-thickness-group"),
  closeBtn: document.getElementById("note-close"),
  saveBtn: document.getElementById("note-save"),
  chunks: [],
  strokeDraft: [],
  activeStroke: null,
  drawing: false,
  pointerId: null,
  lastPenAt: 0,
  activePen: null,
  color: INK_COLORS[0].value,
  size: PEN_SIZES[1].px,
  autosaveTimer: null,
  interactionGuardsBound: false,
  context: null
};

function ensureNoteSources() {
  if (!state.notes.sources.length) {
    state.notes.sources = NOTE_SOURCE_TYPES.map((name, i) => ({
      id: `src_seed_${i+1}`,
      name,
      kind: name,
      created_at: nowISO()
    }));
    persistNoteSources();
  }
}

function ensureNoteChunk(index) {
  if (noteUI.chunks[index]) return noteUI.chunks[index];
  const canvas = document.createElement("canvas");
  canvas.className = "note-chunk";
  canvas.dataset.chunk = String(index);
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const cssWidth = Math.max(300, Math.floor(noteUI.stack.clientWidth - NOTE_SIDE_GUTTER * 2));
  canvas.width = Math.floor(cssWidth * dpr);
  canvas.height = Math.floor(NOTE_CHUNK_HEIGHT * dpr);
  canvas.style.height = NOTE_CHUNK_HEIGHT + "px";
  canvas.style.width = cssWidth + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  noteUI.stack.appendChild(canvas);
  noteUI.chunks[index] = { canvas, ctx, cssWidth, dpr };
  return noteUI.chunks[index];
}

function openNewNoteFlow() {
